<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC月次販売データ — EL COMMUN EC事業部</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f11;
    --bg2: #18181b;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #8b5cf6;
    --accent2: #a78bfa;
    --accent-glow: rgba(139,92,246,0.25);
    --accent-dim: rgba(139,92,246,0.08);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.10);
    --green-border: rgba(52,211,153,0.25);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.10);
    --amber-border: rgba(251,191,36,0.25);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.10);
    --red-border: rgba(248,113,113,0.25);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.10);
    --blue-border: rgba(96,165,250,0.25);
    --text: #fafafa;
    --text2: #a1a1aa;
    --text3: #52525b;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --font: 'Inter', 'Noto Sans JP', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── 背景のグロウエフェクト ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(139,92,246,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(96,165,250,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 64px;
  }

  /* ── ヘッダー ── */
  .header {
    margin-bottom: 40px;
    text-align: center;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    background: var(--accent-dim);
    border: 1px solid rgba(139,92,246,0.20);
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .header-badge .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .header p {
    color: var(--text2);
    font-size: 0.95rem;
    font-weight: 400;
  }

  /* ── メインカード ── */
  .card {
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 20px;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: var(--border-hover); }

  /* ── ドロップゾーン ── */
  .dropzone {
    position: relative;
    border: 1.5px dashed var(--text3);
    border-radius: var(--radius);
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    background: transparent;
    margin-bottom: 28px;
  }
  .dropzone:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(139,92,246,0.12);
    border-style: solid;
    box-shadow: 0 0 0 4px var(--accent-glow), inset 0 0 40px rgba(139,92,246,0.05);
    transform: scale(1.01);
  }
  .dropzone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .dz-icon {
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    transition: all 0.3s;
  }
  .dropzone:hover .dz-icon, .dropzone.drag-over .dz-icon {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .dz-icon svg {
    width: 24px; height: 24px;
    stroke: var(--text2); fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.3s;
  }
  .dropzone:hover .dz-icon svg, .dropzone.drag-over .dz-icon svg { stroke: #fff; }
  .dz-label {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 8px;
    transition: color 0.3s;
  }
  .dropzone.drag-over .dz-label { color: var(--accent2); }

  .file-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
    font-family: var(--mono);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text3);
    transition: all 0.3s;
  }
  .file-status.has-file {
    background: var(--green-dim);
    border-color: var(--green-border);
    color: var(--green);
  }

  /* ── 変換ボタン ── */
  .btn-convert {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 0.92rem;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 24px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }
  .btn-convert::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-convert:hover:not(:disabled)::before { opacity: 1; }
  .btn-convert:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 0 40px rgba(139,92,246,0.35);
  }
  .btn-convert:active:not(:disabled) {
    transform: translateY(0) scale(0.99);
  }
  .btn-convert:disabled {
    background: var(--text3);
    cursor: not-allowed;
    box-shadow: none;
    opacity: 0.5;
  }
  .btn-convert svg {
    width: 18px; height: 18px;
    stroke: #fff; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── メッセージ ── */
  .msg {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    font-size: 0.85rem; font-weight: 500;
    margin-bottom: 20px;
    animation: msgIn 0.4s cubic-bezier(0.4,0,0.2,1);
    border: 1px solid;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.success { background: var(--green-dim); border-color: var(--green-border); color: var(--green); }
  .msg.error   { background: var(--red-dim);   border-color: var(--red-border);   color: var(--red); }
  .msg.warning { background: var(--amber-dim); border-color: var(--amber-border); color: var(--amber); }
  .msg.info    { background: var(--blue-dim);  border-color: var(--blue-border);  color: var(--blue); }
  .msg-icon svg {
    width: 18px; height: 18px; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0; margin-top: 2px;
  }
  .msg.success .msg-icon svg { stroke: var(--green); }
  .msg.error   .msg-icon svg { stroke: var(--red); }
  .msg.warning .msg-icon svg { stroke: var(--amber); }
  .msg.info    .msg-icon svg { stroke: var(--blue); }
  .msg-text { white-space: pre-line; line-height: 1.5; }

  /* ── 空欄テーブル ── */
  .empty-section {
    background: var(--amber-dim);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    animation: msgIn 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .empty-title {
    font-size: 0.85rem; font-weight: 600;
    color: var(--amber);
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .empty-title svg {
    width: 16px; height: 16px;
    stroke: var(--amber); fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .table-wrap {
    max-height: 280px;
    overflow-y: auto;
    border: 1px solid var(--amber-border);
    border-radius: 8px;
    background: rgba(0,0,0,0.2);
  }
  .table-wrap::-webkit-scrollbar { width: 4px; }
  .table-wrap::-webkit-scrollbar-track { background: transparent; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 4px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead tr {
    background: rgba(251,191,36,0.08);
    position: sticky; top: 0;
    backdrop-filter: blur(8px);
  }
  th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    color: var(--amber);
    border-bottom: 1px solid var(--amber-border);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  td {
    padding: 9px 12px;
    color: var(--text2);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: var(--mono);
    font-size: 0.75rem;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }

  /* ── 処理内容カード ── */
  .info-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
  }
  .info-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 16px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .info-title-icon {
    width: 20px; height: 20px;
    stroke: var(--text3); fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
  }
  .checklist { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .checklist li {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.85rem;
    color: var(--text2);
    padding: 6px 0;
  }
  .check-icon {
    width: 18px; height: 18px;
    border-radius: 5px;
    background: var(--accent-dim);
    border: 1px solid rgba(139,92,246,0.20);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .check-icon svg {
    width: 10px; height: 10px;
    stroke: var(--accent2);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── フッター ── */
  .footer {
    text-align: center;
    padding: 24px 0 0;
    color: var(--text3);
    font-size: 0.75rem;
    letter-spacing: 0.02em;
  }

  /* ── スピナー ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── プログレスバーアニメーション ── */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .btn-convert:disabled .spinner + span {
    background: linear-gradient(90deg, var(--text2) 30%, var(--text) 50%, var(--text2) 70%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 1.5s ease infinite;
  }

  /* ── レスポンシブ ── */
  @media (max-width: 600px) {
    .wrapper { padding: 24px 14px 48px; }
    .card { padding: 24px 20px; border-radius: 16px; }
    .header h1 { font-size: 1.5rem; }
    .dropzone { padding: 32px 16px; }
    .dz-icon { width: 48px; height: 48px; }
    .info-section { padding: 18px 20px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-badge">
      <span class="badge-dot"></span>
      EL COMMUN EC事業部
    </div>
    <h1>EC月次販売データ</h1>
    <p>CSVファイルをExcel形式に自動変換</p>
  </div>

  <!-- メインカード -->
  <div class="card">

    <!-- ドロップゾーン -->
    <div class="dropzone" id="dropzone">
      <input type="file" accept=".csv" id="fileInput">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div class="dz-label" id="dzLabel">CSVファイルを選択またはドラッグ&amp;ドロップ</div>
      <div class="file-status" id="fileStatus">ファイル未選択</div>
    </div>

    <!-- 変換ボタン -->
    <button class="btn-convert" id="convertBtn" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="btnLabel">変換して保存</span>
    </button>

  </div>

  <!-- メッセージ -->
  <div id="msgArea" style="display:none;"></div>

  <!-- 空欄リスト -->
  <div id="emptySection" style="display:none;" class="empty-section">
    <div class="empty-title">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      商品番号が空欄の項目（<span id="emptyCount">0</span>件）
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>シート</th><th>販売店舗</th><th>受注番号</th><th>商品名</th></tr></thead>
        <tbody id="emptyTbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 処理内容 -->
  <div class="info-section">
    <div class="info-title">
      <svg class="info-title-icon" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      処理内容
    </div>
    <ul class="checklist">
      <li><span class="check-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span>受注番号で昇順ソート</span></li>
      <li><span class="check-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span>クーポン利用額・送料合計の重複削除</span></li>
      <li><span class="check-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span>税込価格を税抜価格に変換</span></li>
      <li><span class="check-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span>商品名から見出しを削除</span></li>
      <li><span class="check-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span>不要な列を削除</span></li>
      <li><span class="check-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span>自社とメーカーでシート分割</span></li>
    </ul>
  </div>

  <div class="footer">EL COMMUN EC事業部</div>

</div>

<script>
// ─────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────
const dropzone   = document.getElementById('dropzone');
const fileInput  = document.getElementById('fileInput');
const dzLabel    = document.getElementById('dzLabel');
const fileStatus = document.getElementById('fileStatus');
const convertBtn = document.getElementById('convertBtn');
const btnLabel   = document.getElementById('btnLabel');
const msgArea    = document.getElementById('msgArea');
const emptySection = document.getElementById('emptySection');
const emptyCount = document.getElementById('emptyCount');
const emptyTbody = document.getElementById('emptyTbody');

let csvFile = null;

// ─────────────────────────────────────────────
// ファイル選択
// ─────────────────────────────────────────────
fileInput.addEventListener('change', e => setFile(e.target.files[0]));

dropzone.addEventListener('dragover', e => {
  e.preventDefault();
  dropzone.classList.add('drag-over');
  dzLabel.textContent = 'ここにドロップ';
});
dropzone.addEventListener('dragleave', () => {
  dropzone.classList.remove('drag-over');
  dzLabel.textContent = 'CSVファイルを選択またはドラッグ&ドロップ';
});
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  dzLabel.textContent = 'CSVファイルを選択またはドラッグ&ドロップ';
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.csv')) setFile(f);
  else showMsg('CSVファイルを選択してください', 'error');
});

function setFile(f) {
  if (!f) return;
  csvFile = f;
  fileStatus.textContent = f.name;
  fileStatus.classList.add('has-file');
  convertBtn.disabled = false;
  msgArea.style.display = 'none';
  emptySection.style.display = 'none';
}

// ─────────────────────────────────────────────
// メッセージ表示
// ─────────────────────────────────────────────
const iconSVG = {
  success: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  error:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  warning: `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  info:    `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
};
function showMsg(text, type='info') {
  msgArea.style.display = 'block';
  msgArea.innerHTML = `<div class="msg ${type}"><span class="msg-icon">${iconSVG[type]}</span><span class="msg-text">${esc(text)}</span></div>`;
}

// ─────────────────────────────────────────────
// 変換実行
// ─────────────────────────────────────────────
convertBtn.addEventListener('click', async () => {
  if (!csvFile) { showMsg('CSVファイルを選択してください', 'error'); return; }
  convertBtn.disabled = true;
  const origHTML = convertBtn.innerHTML;
  convertBtn.innerHTML = `<span class="spinner"></span><span>処理中...</span>`;
  showMsg('処理中...', 'info');
  emptySection.style.display = 'none';

  await new Promise(r => setTimeout(r, 30));
  try {
    await processData();
  } catch(err) {
    console.error(err);
    showMsg('エラーが発生しました: ' + err.message, 'error');
  } finally {
    convertBtn.disabled = false;
    convertBtn.innerHTML = origHTML;
  }
});

// ─────────────────────────────────────────────
// 処理本体
// ─────────────────────────────────────────────
async function processData() {
  const buf = await csvFile.arrayBuffer();
  const csvText = new TextDecoder('shift-jis').decode(buf);
  const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true, dynamicTyping: false });
  let data = parsed.data;

  // ── 最優先処理 ──
  data = data.map(row => {
    const s = row['販売店舗'] || '';
    let pn = row['商品番号'] || '';

    const drMatch = pn.match(/(XDR-[A-Z]+-[0-9]+|DR-[A-Z]+-[0-9]+)/);
    if (drMatch) {
      row['商品番号'] = pn.substring(pn.indexOf(drMatch[0]));
      return row;
    }

    if (s === 'EL COMMUN auPAYマーケット店') {
      const pats = ['DR-MC-','DR-MG-','DR-MH-','DR-WB-','DR-WK-','DR-WL-','DR-WS-','DR-WV-','XDR-MH-','XDR-WK-'];
      for (const p of pats) {
        if (pn.includes(p)) { row['商品番号'] = pn.substring(pn.indexOf(p)); return row; }
      }
    }
    if (s === 'EL COMMUN auPAYマーケット店' && pn.startsWith('elco-gyr-031')) {
      pn = pn.replace(/^elco-gyr-031/, '');
      if (pn.includes('GYR')) pn = pn.substring(pn.indexOf('GYR'));
      row['商品番号'] = pn;
    }
    if (s === 'EL COMMUN Qoo10' && pn.startsWith('wv-41-')) {
      row['商品番号'] = pn.replace(/^wv-41-/, ''); }
    if (pn === 'elco-WCL-016') row['商品番号'] = 'WCL-016';
    return row;
  });

  // ── ステップ1: 受注番号ソート ──
  data.sort((a, b) => (a['受注番号']||'').localeCompare(b['受注番号']||''));

  // ── ステップ2: クーポン・送料 ──
  data = data.map((row, i) => {
    const cur = row['受注番号'], prev = i > 0 ? data[i-1]['受注番号'] : null;
    return {
      ...row,
      'クーポン利用額_計算後': cur === prev ? '0' : (row['クーポン利用額']||'0'),
      '送料合計_計算後':       cur === prev ? '0' : (row['送料合計']||'0')
    };
  });

  // ── ステップ3: 税込→税抜 ──
  const taxMap = {};
  data.forEach(row => {
    const pn = row['商品番号'], s = row['販売店舗'];
    const price = parseFloat(row['商品単価'])||0;
    if (row['税込別']==='込' && !s.includes('Amazon') && pn && !taxMap[pn])
      taxMap[pn] = Math.round(price/1.1);
  });
  data = data.map(row => {
    const pn = row['商品番号'], s = row['販売店舗'];
    const price = parseFloat(row['商品単価'])||0;
    let np = price;
    if (row['税込別']==='込')
      np = s.includes('Amazon') && taxMap[pn] ? taxMap[pn] : Math.round(price/1.1);
    return { ...row, '商品単価': np.toString() };
  });

  // ── ステップ4: 商品名見出し削除 ──
  const headPats = [
    /^＼ポイント2倍＋クーポン／/, /^＼ポイント2倍!／/, /^＼ポイント2倍／/,
    /^＼ポイントキャンペーン／/, /^＼P2倍＋クーポン／/,
    /^【ご予約 12月中旬発送】/
  ];
  data = data.map(row => {
    let n = row['商品名']||'';
    headPats.forEach(p => { n = n.replace(p,''); });
    return { ...row, '商品名': n };
  });

  // ── ステップ5: 不要列削除 ──
  const rmCols = ['注文日時','出荷日','SKU管理番号','項目・選択肢','税込別','商品URL'];
  data = data.map(row => {
    const r = { ...row };
    rmCols.forEach(c => delete r[c]);
    r['クーポン利用額'] = r['クーポン利用額_計算後'];
    r['送料合計']       = r['送料合計_計算後'];
    delete r['クーポン利用額_計算後'];
    delete r['送料合計_計算後'];
    return r;
  });

  // ── ステップ6: 自社/メーカー分類 ──
  const makerPrefixes = ['4on-','8mw-','af','ai-','aito-','ak-','alsk-','apj-','bm-','cocochi-','cre-','ef','ldw',
                         'ma-','mgt-','MO','nlf','nm-','pb-','psm-','rio-','sh-','SLW-','tp-','tri-','wf','wh-','ky-'];
  const makerProductNames = ['【Raffinart】'];
  const makerData = [], ownData = [];

  data.forEach(row => {
    const pn = row['商品番号']||'', s = row['販売店舗']||'', name = row['商品名']||'';
    if (s==='EL COMMUN auPAYマーケット店' && pn.startsWith('elco-gyr-031'))  { ownData.push(row); return; }
    if (s==='EL COMMUN Qoo10' && pn.startsWith('wv-41-'))                     { ownData.push(row); return; }
    if (s==='EL COMMUN Qoo10' && pn.startsWith('ma-41-'))                     { ownData.push(row); return; }
    if (s==='EL COMMUN Yahoo店' && pn.startsWith('ma-46-'))                   { ownData.push(row); return; }
    if (s==='EL COMMUN Yahoo店' && pn.startsWith('MOF-'))                     { ownData.push(row); return; }
    if (pn.startsWith('DR-') || pn.startsWith('XDR-'))                        { ownData.push(row); return; }
    const isMaker = makerPrefixes.some(p => pn.startsWith(p)) || pn==='303069-C'
                    || makerProductNames.some(n => name.startsWith(n));
    (isMaker ? makerData : ownData).push(row);
  });

  const storeOrder = ['EL COMMUN 楽天市場店','LAIKLE 楽天市場店','EL COMMUN Yahoo店',
                      'EL COMMUN Amazon店','EL COMMUN auPAYマーケット店','EL COMMUN Qoo10','EL COMMUN Shopify'];
  const sortByStore = arr => arr.sort((a,b) => {
    let ia=storeOrder.indexOf(a['販売店舗']||''), ib=storeOrder.indexOf(b['販売店舗']||'');
    if (ia===-1) ia=9999; if (ib===-1) ib=9999;
    if (ia!==ib) return ia-ib;
    return (a['受注番号']||'').localeCompare(b['受注番号']||'');
  });
  sortByStore(ownData); sortByStore(makerData);

  // ── 自社データの商品番号整形 ──
  ownData.forEach(row => {
    const s = row['販売店舗']||'';
    let pn = row['商品番号']||'';
    const name = row['商品名']||'';

    if (s==='EL COMMUN Qoo10') {
      if (/^elco-pbc.+-/.test(pn) && name.startsWith('ワンポイント ブックカバー')) { row['商品番号']='PBC-001'; return; }
      if (name.startsWith('SCHATZ シャッツ 帆布ペンケース'))                       { row['商品番号']='CPC-024'; return; }
      if (name.startsWith('MASTERPIECE マスターピース ブックカバー'))               { row['商品番号']='MTP-001'; return; }
    }

    if (s==='EL COMMUN auPAYマーケット店') {
      if (pn.match(/^cal-.+-CAL-.+$/))      { row['商品番号']=pn.replace(/^cal-.+-(CAL-.+)$/,'$1'); return; }
      if (pn.match(/^elco-(LLN|ECL)-.+$/)) { row['商品番号']=pn.replace(/^elco-/,''); return; }
      row['商品番号']=pn.replace(/elco-[^-]+-/g,''); return;
    }

    if      (pn.match(/^cal-.+-CAL-.+$/))                { pn=pn.replace(/^cal-.+-(CAL-.+)$/,'$1'); }
    else if (pn.match(/GYR/))                            { pn=pn.replace(/^.*?(GYR.*)$/,'$1'); }
    else if (pn.match(/^elco-ampc(\d+)-/))               { pn=pn.replace(/^elco-ampc(\d+)-.*$/,'AMP-C$1'); }
    else if (pn.match(/^elco-(LLN|ECL)-.+$/))            { row['商品番号']=pn.replace(/^elco-/,''); return; }
    else if (pn.match(/^elco-(.+?)wf-(natural|brown)$/)) { pn=pn.replace(/^elco-(.+?)wf-(natural|brown)$/,'$1'); }
    else if (pn.match(/^elco-lln(.+?)-/))                { pn=pn.replace(/^elco-lln(.+?)-.*$/,'LLN-$1'); }
    else if (pn.match(/^elco-ecl(.+?)-/))                { pn=pn.replace(/^elco-ecl(.+?)-.*$/,'ECL-$1'); }
    else if (pn==='elco-wpk101')                         { pn='WPK-101'; }
    else if (pn.match(/^elco-wcl(\d+)$/))                { pn=pn.replace(/^elco-wcl(\d+)$/,'WCL-$1'); }
    else if (pn.match(/^elco-CRB(\d+)-?$/))              { pn=pn.replace(/^elco-CRB(\d+)-?$/,'CRB-$1'); }
    else if (pn.match(/^elco-lln-.+wf-(LLN-.+?)wf-.+$/)) { pn=pn.replace(/^elco-lln-.+wf-(LLN-.+?)wf-.+$/,'$1'); }
    else if (pn.match(/^elco-elc-.+wf-(ECL-.+?)wf-.+$/)) { pn=pn.replace(/^elco-elc-.+wf-(ECL-.+?)wf-.+$/,'$1'); }
    else if (pn.match(/^elco-gyr-091(.+)$/))             { pn=pn.replace(/^elco-gyr-091(.+)$/,'$1'); }
    else if (pn.match(/^elco-gyr-061(.+)$/))             { pn=pn.replace(/^elco-gyr-061(.+)$/,'$1'); }
    else if (pn.match(/^elco-gyr-074(.+)$/))             { pn=pn.replace(/^elco-gyr-074(.+)$/,'$1'); }
    else if (pn.match(/^elco-nba-041-(.+)$/))            { pn=pn.replace(/^elco-nba-041-(.+)$/,'$1'); }
    else                                                 { pn=pn.replace(/elco-[^-]+-/g,''); }

    pn=pn.replace(/cal-[^-]+-/g,'');
    ['lln-','mh-','ma-','mg-','mc-','wb-','wk-','wx-','ws-','wl-'].forEach(pfx => {
      pn=pn.replace(new RegExp(pfx+'[^-]+-','g'),'');
    });

    for (const dp of ['WK-','WB-','WS-','WL-','WX-','MC-','MG-','MH-']) {
      const m=pn.match(new RegExp(`.*\\(${dp}([^)]+)\\).*`));
      if (m) { pn='DR-'+m[1]; break; }
    }
    pn=pn.replace(/wf-natural/g,'').replace(/wf-brown/g,'');
    row['商品番号']=pn;
  });

  ownData.forEach(row => {
    const s=row['販売店舗']||''; let pn=row['商品番号']||'';
    if (s!=='EL COMMUN auPAYマーケット店') return;
    let matched=false;
    for (const dp of ['WK-','WB-','WS-','WL-','WX-','WV-','MC-','MG-','MH-']) {
      const m=pn.match(new RegExp(`.*[（(](${dp}[^）)]+)[）)]`));
      if (m) { pn='DR-'+m[1]; matched=true; break; }
    }
    if (!matched && (pn.includes('(')||pn.includes('（')))
      pn=pn.replace(/.*[（(]([^）)]+)[）)].*/,'$1');
    pn=pn.replace(/[（(）)]/g,'');
    if (pn.startsWith('WV-')) pn='DR-'+pn;
    row['商品番号']=pn;
  });

  const moveToOwn=[], remainInMaker=[];
  makerData.forEach(row => {
    const s=row['販売店舗']||''; let pn=row['商品番号']||'';
    if (s==='EL COMMUN auPAYマーケット店' && pn.includes('（MC-')) {
      const m=pn.match(/.*[（(](MC-[^）)]+)[）)]/);
      if (m) { row['商品番号']='DR-'+m[1].replace(/[（(）)]/g,''); moveToOwn.push(row); return; }
    }
    if (pn.startsWith('ma-46-'))                              { row['商品番号']=pn.replace(/^ma-46-/,''); moveToOwn.push(row); return; }
    if (s==='EL COMMUN Yahoo店' && pn.startsWith('MOF-'))    { moveToOwn.push(row); return; }
    remainInMaker.push(row);
  });
  ownData.push(...moveToOwn);
  makerData.length=0; makerData.push(...remainInMaker);
  sortByStore(ownData); sortByStore(makerData);

  ownData.forEach(row => {
    let pn=row['商品番号']||''; const name=row['商品名']||'';
    pn=pn.replace(/wf-natural/g,'').replace(/wf-brown/g,'');
    if (pn==='WB-470') pn='DR-WB-470';
    else if (pn==='WB-471') pn='DR-WB-471';
    if (pn.startsWith('elco-lbg')) pn='LBG-'+pn.substring(8);
    if (pn.startsWith('DR-') && (name.includes('【限定】')||name.includes('【EC限定】')))
      pn='XDR-'+pn.substring(3);
    row['商品番号']=pn;
  });

  const calcTotal = row =>
    Math.round((parseFloat(row['商品単価'])||0)*(parseFloat(row['個数'])||0)
               - Math.abs(parseFloat(row['クーポン利用額'])||0)
               + (parseFloat(row['送料合計'])||0));

  const addTotals = arr => arr.forEach(row => { row['合計']=calcTotal(row); row['総合計']=''; });
  addTotals(ownData); addTotals(makerData);

  const addStoreTotals = arr => {
    const storeMap=new Map();
    arr.forEach((row,i) => {
      const s=row['販売店舗']||'';
      if (!storeMap.has(s)) storeMap.set(s,[]);
      storeMap.get(s).push(i);
    });
    let grandTotal=0;
    storeMap.forEach(indices => {
      let st=0; indices.forEach(i => { st+=arr[i]['合計']||0; });
      arr[indices[indices.length-1]]['総合計']=st;
      grandTotal+=st;
    });
    arr.push({'販売店舗':'','受注番号':'','商品名':'','商品番号':'','個数':'','商品単価':'','クーポン利用額':'','送料合計':'','合計':'','総合計':grandTotal});
  };
  addStoreTotals(ownData); addStoreTotals(makerData);

  const emptyItems=[];
  const allData=[
    ...ownData.map(r=>({...r,_sheet:'自社'})),
    ...makerData.map(r=>({...r,_sheet:'メーカー'}))
  ];
  allData.forEach(row => {
    const pn=(row['商品番号']||'').toString().trim(), s=(row['販売店舗']||'').toString().trim();
    if (!pn && s) emptyItems.push({シート:row._sheet, 販売店舗:row['販売店舗']||'', 受注番号:row['受注番号']||'', 商品名:row['商品名']||''});
  });

  if (emptyItems.length>0) {
    emptyCount.textContent=emptyItems.length;
    emptyTbody.innerHTML=emptyItems.map(item=>
      `<tr><td>${esc(item.シート)}</td><td>${esc(item.販売店舗)}</td><td>${esc(item.受注番号)}</td><td>${esc(item.商品名)}</td></tr>`
    ).join('');
    emptySection.style.display='block';
  }

  const wb=XLSX.utils.book_new();
  const now=new Date();
  const lm=new Date(now.getFullYear(), now.getMonth()-1, 1);
  const monthStr=`${lm.getFullYear()}年${lm.getMonth()+1}月`;
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ownData),   '自社');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(makerData), 'メーカー');
  XLSX.writeFile(wb, `${monthStr}販売数.xlsx`);

  const ownLen=ownData.length-1, makerLen=makerData.length-1;
  if (emptyItems.length>0)
    showMsg(`処理完了！自社: ${ownLen}件、メーカー: ${makerLen}件\n⚠️ 商品番号が空欄: ${emptyItems.length}件`, 'warning');
  else
    showMsg(`処理完了！自社: ${ownLen}件、メーカー: ${makerLen}件`, 'success');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
