<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EC 販売データ集計</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #1c1917;
      --ink-2:   #44403c;
      --ink-3:   #78716c;
      --ink-4:   #a8a29e;
      --paper:   #faf8f4;
      --white:   #ffffff;
      --border:  #e7e2da;
      --border2: #f0ece5;
      --gold:    #92754a;
      --gold-lt: #f5efe4;
      --green:   #3a6b52;
      --green-lt:#edf5f0;
      --red-lt:  #fdf2ee;
      --red:     #b85c3c;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro W3', 'Meiryo', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ══ Header ══════════════════════════════════════════════════════════════ */
    .header {
      background: var(--ink);
      color: var(--white);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 300;
      gap: 20px;
    }
    .header-logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--white);
    }
    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,.4);
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 400;
    }
    .header-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.1);
    }
    .header-tag {
      font-size: 10px;
      color: rgba(255,255,255,.45);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ══ Page layout ═════════════════════════════════════════════════════════ */
    .page { max-width: 1320px; margin: 0 auto; padding: 40px 32px 80px; }

    /* ══ Section title ═══════════════════════════════════════════════════════ */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    /* ══ Upload cards ════════════════════════════════════════════════════════ */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .drop-zone {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, background .2s;
      position: relative;
      overflow: hidden;
    }
    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(146,117,74,.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .drop-zone:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 24px rgba(146,117,74,.12);
    }
    .drop-zone.over {
      border-color: var(--gold);
      background: var(--gold-lt);
      box-shadow: 0 4px 24px rgba(146,117,74,.18);
    }
    .drop-zone.done {
      border-color: var(--green);
      background: var(--green-lt);
    }
    .drop-zone.done::before { background: none; }

    .dz-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--gold);
      margin-bottom: 12px;
      display: block;
    }
    .dz-icon {
      font-size: 28px;
      margin-bottom: 10px;
      display: block;
      filter: grayscale(20%);
    }
    .dz-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .dz-hint {
      font-size: 12px;
      color: var(--ink-4);
      line-height: 1.5;
    }
    .dz-file {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dz-file::before { content: '✓'; font-size: 11px; }
    input[type=file] { display: none; }

    /* ══ Run button ══════════════════════════════════════════════════════════ */
    .run-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .btn-run {
      background: var(--ink);
      color: var(--white);
      border: none;
      padding: 13px 36px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .04em;
      transition: background .18s, transform .1s, opacity .18s;
      position: relative;
    }
    .btn-run:hover:not(:disabled) {
      background: #2c2622;
      transform: translateY(-1px);
    }
    .btn-run:active:not(:disabled) { transform: translateY(0); }
    .btn-run:disabled { opacity: .35; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--ink-3);
      border: 1.5px solid var(--border);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .18s, color .18s;
    }
    .btn-ghost:hover { border-color: var(--ink-3); color: var(--ink); }

    /* ══ Notice bar ══════════════════════════════════════════════════════════ */
    .notice {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      font-weight: 500;
    }
    .notice.show { display: flex; }
    .notice.info  { background: var(--gold-lt);  color: #7a5f35; border: 1px solid #dfd0b4; }
    .notice.ok    { background: var(--green-lt); color: #2d5540; border: 1px solid #b4d4c4; }
    .notice.err   { background: var(--red-lt);   color: #8a3820; border: 1px solid #e0beb0; }

    /* ══ Summary cards ═══════════════════════════════════════════════════════ */
    #result { display: none; }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .kpi {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .kpi::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
      opacity: .35;
    }
    .kpi-val {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
      letter-spacing: -.02em;
    }
    .kpi-lbl {
      font-size: 10px;
      font-weight: 700;
      color: var(--ink-4);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ══ Filter row ══════════════════════════════════════════════════════════ */
    .filter-row {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      border-bottom: none;
    }
    .filter-label {
      font-size: 11px;
      color: var(--ink-4);
      font-weight: 600;
      white-space: nowrap;
    }

    .f-input, .f-select {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--ink);
      background: var(--paper);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      font-family: inherit;
    }
    .f-input:focus, .f-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(146,117,74,.12);
      background: var(--white);
    }
    .f-input[type=text] { width: 210px; }
    .f-input[type=date] { width: 140px; }

    .f-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .f-spacer { flex: 1; }
    .f-count {
      font-size: 12px;
      color: var(--ink-4);
      white-space: nowrap;
    }

    .btn-export {
      height: 36px;
      padding: 0 18px;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .04em;
      transition: background .18s;
      white-space: nowrap;
    }
    .btn-export:hover { background: #2e5742; }

    /* ══ Table ═══════════════════════════════════════════════════════════════ */
    .table-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(28,25,23,.05);
    }
    .table-scroll {
      overflow-x: auto;
      max-height: calc(100vh - 380px);
      overflow-y: auto;
      min-height: 280px;
    }

    table { width: 100%; border-collapse: collapse; }
    thead { position: sticky; top: 0; z-index: 10; }

    th {
      background: var(--ink);
      color: rgba(255,255,255,.7);
      padding: 11px 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-align: left;
      border-right: 1px solid rgba(255,255,255,.06);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color .15s;
    }
    th:last-child { border-right: none; }
    th:hover { color: rgba(255,255,255,.95); }
    th.asc  { color: #e8d5a8; }
    th.desc { color: #e8d5a8; }
    th.asc::after  { content: ' ↑'; font-size: 10px; }
    th.desc::after { content: ' ↓'; font-size: 10px; }

    td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border2);
      vertical-align: middle;
      line-height: 1.45;
    }
    tr:last-child td { border-bottom: none; }

    .data-row { transition: background .1s; }
    .data-row:hover td { background: #fdf9f4; }

    /* Date group header */
    .date-row td {
      background: var(--paper);
      padding: 6px 14px 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: .08em;
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
    }
    .date-row:first-child td { border-top: none; }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      white-space: nowrap;
    }
    td.td-date { font-size: 12px; color: var(--ink-3); white-space: nowrap; }
    td.td-code { font-size: 11px; color: var(--ink-3); white-space: nowrap; font-family: 'SF Mono','Menlo','Consolas',monospace; }
    td.td-name { max-width: 360px; }
    td.td-price { white-space: nowrap; }

    .tag-unmatched {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--red-lt);
      color: var(--red);
      vertical-align: middle;
      margin-left: 5px;
      text-transform: uppercase;
    }

    .empty-row td {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-4);
      font-size: 14px;
    }

    /* ══ Pagination ══════════════════════════════════════════════════════════ */
    .pager {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 18px;
      border-top: 1px solid var(--border2);
      background: var(--white);
    }
    .pg {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border: 1px solid var(--border);
      background: var(--white);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--ink-2);
      font-family: inherit;
      transition: border-color .15s, color .15s, background .15s;
    }
    .pg:hover:not([disabled]) { border-color: var(--gold); color: var(--gold); }
    .pg.on { background: var(--ink); color: var(--white); border-color: var(--ink); }
    .pg[disabled] { opacity: .3; cursor: not-allowed; }
    .pg-ellipsis { font-size: 12px; color: var(--ink-4); padding: 0 2px; }
    .pg-info { margin-left: auto; font-size: 11px; color: var(--ink-4); }

    /* ══ Spinner ═════════════════════════════════════════════════════════════ */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(28,25,23,.2);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }
    .notice.info .spinner { border-color: rgba(146,117,74,.3); border-top-color: var(--gold); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ Divider ═════════════════════════════════════════════════════════════ */
    .divider { height: 1px; background: var(--border); margin: 32px 0; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-logo">
    <span class="header-title">EC 販売データ集計</span>
    <span class="header-sub">Sales Report</span>
  </div>
  <div class="header-line"></div>
  <span class="header-tag">EL COMMUN</span>
  <span class="header-tag" style="font-size:9px;opacity:.35;">v2026-05-21s</span>
</header>

<!-- ── Page ── -->
<div class="page">

  <!-- Upload -->
  <p class="section-label">Step 1 — ファイルをアップロード</p>
  <div class="upload-grid">
    <div class="drop-zone" id="z-sales">
      <span class="dz-num">01 &nbsp;販売データ</span>
      <span class="dz-icon">📊</span>
      <div class="dz-label">CSV ファイル</div>
      <div class="dz-hint">楽天受注CSV（Shift-JIS）<br>クリックまたはドラッグ＆ドロップ</div>
      <input type="file" id="f-sales" accept=".csv">
      <div class="dz-file" id="n-sales" style="display:none"></div>
    </div>
    <div class="drop-zone" id="z-product">
      <span class="dz-num">02 &nbsp;商品データ</span>
      <span class="dz-icon">📦</span>
      <div class="dz-label">Excel ファイル</div>
      <div class="dz-hint">最新の商品マスター .xlsx<br>クリックまたはドラッグ＆ドロップ</div>
      <input type="file" id="f-product" accept=".xlsx,.xls">
      <div class="dz-file" id="n-product" style="display:none"></div>
    </div>
  </div>

  <!-- Run -->
  <p class="section-label">Step 2 — 集計を実行</p>
  <div class="run-row">
    <button class="btn-run" id="btn-run" disabled>集計する</button>
    <button class="btn-ghost" id="btn-reset" style="display:none">リセット</button>
  </div>

  <!-- Notice -->
  <div class="notice" id="notice"></div>

  <!-- Results -->
  <div id="result">

    <!-- KPIs -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Filter -->
    <div class="filter-row">
      <span class="filter-label">期間</span>
      <input class="f-input" type="date" id="f-from">
      <span class="filter-label">〜</span>
      <input class="f-input" type="date" id="f-to">
      <div class="f-sep"></div>
      <select class="f-select" id="f-store"></select>
      <input class="f-input" type="text" id="f-text" placeholder="商品名・商品番号で検索…">
      <div class="f-spacer"></div>
      <span class="f-count" id="f-count"></span>
      <button class="btn-export" onclick="doExport()">CSV 出力</button>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-scroll" id="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-col="date"  style="min-width:86px">販売日</th>
              <th data-col="cat1"  style="min-width:100px">大分類</th>
              <th data-col="cat2"  style="min-width:100px">中分類</th>
              <th data-col="cat3"  style="min-width:100px">小分類</th>
              <th data-col="name"  style="min-width:280px">商品名</th>
              <th data-col="code"  style="min-width:110px">商品番号</th>
              <th data-col="price" style="min-width:90px" class="num">税抜単価</th>
              <th data-col="qty"   style="min-width:56px" class="num">数量</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pager" id="pg"></div>
    </div>

  </div><!-- /result -->
</div><!-- /page -->

<script>
// ── State ───────────────────────────────────────────────────────────────────
let salesBuf = null, productBuf = null;
let allRows   = [];   // fully processed rows
let sortCol   = 'date';
let sortDir   = 1;
let curPage   = 1;
const PER_PAGE = 500;

// ── File upload ──────────────────────────────────────────────────────────────
function initZone(zoneId, inputId, type) {
  const zone  = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); if (e.dataTransfer.files[0]) receive(e.dataTransfer.files[0], type); });
  input.addEventListener('change', e => { if (e.target.files[0]) receive(e.target.files[0], type); });
}

function receive(file, type) {
  const reader = new FileReader();
  reader.onload = e => {
    if (type === 'sales') {
      salesBuf = e.target.result;
      const el = document.getElementById('n-sales');
      el.textContent = file.name; el.style.display = 'flex';
      document.getElementById('z-sales').classList.add('done');
    } else {
      productBuf = e.target.result;
      const el = document.getElementById('n-product');
      el.textContent = file.name; el.style.display = 'flex';
      document.getElementById('z-product').classList.add('done');
    }
    document.getElementById('btn-run').disabled = !(salesBuf && productBuf);
  };
  reader.readAsArrayBuffer(file);
}

initZone('z-sales',   'f-sales',   'sales');
initZone('z-product', 'f-product', 'product');

// ── CSV parser （Shift-JIS, handles quoted multiline） ────────────────────────
function parseCSV(buf) {
  const text = new TextDecoder('shift-jis').decode(new Uint8Array(buf));
  const rows = [];
  let cur = [], f = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { f += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      cur.push(f); f = '';
    } else if ((c === '\r' || c === '\n') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++;
      cur.push(f); f = '';
      if (cur.some(v => v)) rows.push(cur);
      cur = [];
    } else {
      f += c;
    }
  }
  if (f || cur.length) { cur.push(f); if (cur.some(v => v)) rows.push(cur); }
  return rows;
}

// ── Excel product master ─────────────────────────────────────────────────────
function buildProductMap(buf) {
  const wb  = XLSX.read(new Uint8Array(buf), { type: 'array' });
  const map = new Map();

  function load(sheetName) {
    const ws = wb.Sheets[sheetName];
    if (!ws) return;
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    // Row 0 = guide row, Row 1 = header, Row 2+ = data
    // col8 = 品番, col9 = 品名
    for (let i = 2; i < data.length; i++) {
      const r    = data[i];
      const code = r[8] != null ? String(r[8]).trim() : '';
      const name = r[9] != null ? String(r[9]).replace(/^[\s　]+|[\s　]+$/g, '') : '';
      if (code && name && code !== 'None') map.set(code, name);
    }
  }

  load('商品データ');
  load('plaisir別注');
  return map;
}

// 商品分類マップ: 品番 → { cat1, cat2, cat3 }（名称）
// 戻り値: { map: Map, debug: string }
function buildCategoryMap(buf) {
  const wb  = XLSX.read(new Uint8Array(buf), { type: 'array' });
  const dbg = [];
  dbg.push('シート一覧: ' + wb.SheetNames.join(' / '));

  // ── Step 1: '商品分類' から階層ツリーを構築（スパース行を繰り越しで処理）────────
  // 小分類コードは中分類をまたいで重複するため複合キー "c1|c2|c3" で管理する。
  // データ行はスパース形式（大分類/中分類は変わる時のみ値あり）なので繰り越しが必要。
  const catTree = new Map(); // "c1|c2|c3" → {cat1, cat2, cat3}
  const cat1Map = new Map(); // c1 → cat1名（大分類コードは全体一意）
  const cat2Map = new Map(); // "c1|c2" → cat2名
  const wsCat   = wb.Sheets['商品分類'];
  if (!wsCat) { dbg.push('商品分類シートなし'); }
  else {
    const rows    = XLSX.utils.sheet_to_json(wsCat, { header: 1, defval: null });
    let hdrIdx = -1, c1c = -1, c2c = -1, c3c = -1;
    for (let r = 0; r < Math.min(8, rows.length); r++) {
      const row = rows[r].map(v => v != null ? String(v).trim() : '');
      const i1 = row.indexOf('大分類'), i2 = row.indexOf('中分類'), i3 = row.indexOf('小分類');
      if (i1 >= 0 && i2 >= 0) { hdrIdx = r; c1c = i1; c2c = i2; c3c = i3; break; }
    }
    dbg.push(`商品分類: ヘッダ行=${hdrIdx} c1col=${c1c} c2col=${c2c} c3col=${c3c}`);
    if (hdrIdx >= 0) {
      const dataRows = rows.slice(hdrIdx + 1).filter(r => r.some(v => v != null));
      dbg.push(`商品分類: データ行数=${dataRows.length}`);
      dataRows.slice(0, 3).forEach((r, i) =>
        dbg.push(`  [${i}]: ` + r.map((v,ci) => v != null ? `col${ci}=${String(v).trim()}` : '').filter(Boolean).join(' ')));
      const val = (row, col) => col >= 0 && row[col] != null ? String(row[col]).trim() : '';
      let lastC1v = '', lastC1n = '', lastC2v = '', lastC2n = '';
      for (const row of dataRows) {
        const c1v = val(row, c1c), c1n = val(row, c1c + 1);
        const c2v = val(row, c2c), c2n = val(row, c2c + 1);
        const c3v = val(row, c3c), c3n = val(row, c3c + 1);
        // 大分類/中分類が空のスパース行は直前の値を継承
        if (c1v) { lastC1v = c1v; lastC1n = c1n; }
        if (c2v) { lastC2v = c2v; lastC2n = c2n; }
        const ec1v = c1v || lastC1v, ec1n = c1n || lastC1n;
        const ec2v = c2v || lastC2v, ec2n = c2n || lastC2n;
        if (ec1v) cat1Map.set(ec1v, ec1n);
        if (ec1v && ec2v) cat2Map.set(ec1v + '|' + ec2v, ec2n);
        if (ec1v && ec2v && c3v) catTree.set(ec1v + '|' + ec2v + '|' + c3v, { cat1: ec1n, cat2: ec2n, cat3: c3n });
      }
      dbg.push(`cat1Map(${cat1Map.size}): ` + JSON.stringify([...cat1Map].slice(0, 5)));
      dbg.push(`cat2Map(${cat2Map.size}): ` + JSON.stringify([...cat2Map].slice(0, 5)));
      dbg.push(`catTree(${catTree.size}): ` + JSON.stringify([...catTree].slice(0, 3)));
    }
  }

  // ── Step 2: '商品データ' から 品番 → {c1,c2,c3} コードを取得 ────────────────
  // 品番は buildProductMap と同じく col8 を使用。
  // カテゴリコード列は「cat1/cat2/cat3Map のキーと一致する値が多い列」で自動検出。
  const codeMap = new Map();
  const wsData  = wb.Sheets['商品データ'];
  if (wsData) {
    const rows     = XLSX.utils.sheet_to_json(wsData, { header: 1, defval: null });
    const piCol    = 8; // buildProductMap と同じ固定列
    const dataRows = rows.slice(2).filter(r => r[piCol] != null);

    dbg.push(`商品データ: データ行数=${dataRows.length} 品番col=${piCol}`);
    dataRows.slice(0, 2).forEach((r, i) =>
      dbg.push(`  行${i}: ` + r.map((v, ci) => v != null ? `col${ci}=${String(v).trim()}` : '').filter(Boolean).slice(0, 15).join(' ')));

    const numCols = rows.reduce((m, r) => Math.max(m, r.length), 0);
    const knownC1 = new Set(cat1Map.keys());
    // 複合キーから個々のコード部分を抽出してマッチ用セットを作成
    const knownC2 = new Set([...cat2Map.keys()].map(k => k.split('|')[1]));
    const knownC3 = new Set([...catTree.keys()].map(k => k.split('|')[2]));

    // 各列をスキャンして既知コードとのマッチ率を計算（排他的グリーディ割り当て）
    const colScores = [];
    for (let col = 0; col < numCols; col++) {
      const vals = dataRows.map(r => r[col] != null ? String(r[col]).trim() : '').filter(Boolean);
      if (!vals.length) { colScores.push({ col, s1: 0, s2: 0, s3: 0 }); continue; }
      colScores.push({
        col,
        s1: vals.filter(v => knownC1.has(v)).length / vals.length,
        s2: vals.filter(v => knownC2.has(v)).length / vals.length,
        s3: vals.filter(v => knownC3.has(v)).length / vals.length,
      });
    }
    // 排他的割り当て: 最高スコアから順に割り当て、同一列を重複使用しない
    const bestExclusive = (key, exclude) => {
      const sorted = [...colScores].sort((a, b) => b[key] - a[key]);
      return sorted.find(e => !exclude.has(e.col) && e[key] > 0.3) || null;
    };
    const used = new Set();
    const b1 = bestExclusive('s1', used); const c1Col = b1 ? (used.add(b1.col), b1.col) : -1;
    const b2 = bestExclusive('s2', used); const c2Col = b2 ? (used.add(b2.col), b2.col) : -1;
    const b3 = bestExclusive('s3', used); const c3Col = b3 ? (used.add(b3.col), b3.col) : -1;
    dbg.push(`商品データ 検出: c1col=${c1Col}(${b1?.s1?.toFixed(2)||'-'}) c2col=${c2Col}(${b2?.s2?.toFixed(2)||'-'}) c3col=${c3Col}(${b3?.s3?.toFixed(2)||'-'})`);
    dbg.push('列スコアtop5: ' + [...colScores].sort((a,b)=>Math.max(b.s1,b.s2,b.s3)-Math.max(a.s1,a.s2,a.s3)).slice(0,5).map(e=>`col${e.col}[${e.s1.toFixed(2)}/${e.s2.toFixed(2)}/${e.s3.toFixed(2)}]`).join(' '));

    if (c1Col >= 0 || c2Col >= 0 || c3Col >= 0) {
      for (const row of dataRows) {
        const code = String(row[piCol]).trim();
        if (!code || code === 'None') continue;
        const s = (ci) => ci >= 0 && row[ci] != null ? String(row[ci]).trim() : '';
        const c1 = s(c1Col), c2 = s(c2Col), c3 = s(c3Col);
        if (c1 || c2 || c3) codeMap.set(code, { c1, c2, c3 });
      }
    }
    dbg.push(`codeMap: ${codeMap.size}件  サンプル: ` + JSON.stringify([...codeMap.entries()].slice(0, 3)));
  }

  // ── Step 3: 品番 → {cat1, cat2, cat3}（名称）マップを返す ──────────────────
  // 複合キー "c1|c2|c3" で階層ツリーを参照し、小分類コードの衝突を回避する
  const map = new Map();
  for (const [code, { c1, c2, c3 }] of codeMap) {
    const tree = catTree.get(c1 + '|' + c2 + '|' + c3);
    const cat1 = tree?.cat1 || cat1Map.get(c1) || '';
    const cat2 = tree?.cat2 || cat2Map.get(c1 + '|' + c2) || '';
    const cat3 = tree?.cat3 || '';
    if (cat1 || cat2 || cat3) map.set(code, { cat1, cat2, cat3 });
  }
  dbg.push(`最終マップ: ${map.size}件  サンプル: ` + JSON.stringify([...map.entries()].slice(0, 3)));
  return { map, debug: dbg.join('\n') };
}

// ── 商品番号から内部品番を抽出 ───────────────────────────────────────────────
// Rules (in priority order):
//  1. ma-/mg-/mh-/mc-/mk-/mb-/wb-/wk-/ws-/wv-/wx- 手帳系 → DR-XX-NNN / XDR-XX-NNN
//  2. cal-**- カレンダー → cal-XX- の後ろ
//  3. elco- 自社商品  → lowercase セグメントを除去して残りを品番化
//  4. auPAY 括弧コード → （XXX-NNN）の中身、MC-NNN は DR-MC-NNN に変換
//  5. その他 lowercase-PREFIX-UPPERCASE コード（メーカー商品含む: ldw001-LDW-006 など）
//  6. 数値サフィックス (例: 8mw-mm110971-110972)
function extractProductCode(pn, store) {
  if (!pn) return null;
  // 在庫SFD- プレフィックス除去（例: 在庫SFD-001 → SFD-001）
  if (/^在庫SFD-/i.test(pn)) return pn.slice(2);
  const auPAY = store && store.includes('auPAY');

  // ① 手帳系プレフィックス: ma-/mg-/mh-/mc-/mk-/mb-/wb-/wk-/ws-/wv-/wx-/wl-
  if (/^(?:ma|mg|mh|mc|mk|mb|wb|wk|ws|wv|wx|wl)-/i.test(pn)) {
    // DR-XX-NNN / XDR-XX-NNN パターンを優先
    const hits = pn.match(/X?DR-[A-Z]{2,3}-\d+/g);
    if (hits) return hits[hits.length - 1];
    // 括弧内コード: （WK-710） → DR-WK-710
    const bm = pn.match(/[（(]([A-Z]{2,3}-\d+)[）)]/);
    if (bm) return 'DR-' + bm[1];
    // 裸の大文字コード: WB-478 → DR-WB-478
    const dm = pn.match(/[A-Z]{2,3}-\d+/g);
    if (dm) return 'DR-' + dm[dm.length - 1];
    return null;
  }

  // ② カレンダー: cal-**-CAL-NNN
  if (/^cal-/i.test(pn)) {
    const m = pn.match(/^cal-[^-]+-(.+)$/i);
    return m ? normalizeCode(m[1]) : null;
  }

  // ③ elco- 自社商品
  if (/^elco-/i.test(pn)) {
    // 括弧あり → 括弧内コードを優先
    const bm = pn.match(/[（(]([A-Z]+-\d+)[）)]/);
    if (bm) {
      const c = bm[1];
      return normalizeCode(/^MC-\d+$/.test(c) ? 'DR-' + c : c);
    }
    // elco- を除去して先頭のlowercase セグメントをさらに除去
    let rest = pn.slice(5); // drop "elco-"
    // lowercase セグメント自体を記憶（rest が空になった場合のフォールバック用）
    const lowSeg = (rest.match(/^([a-z][a-z0-9]*)(?:-|$)/) || [])[1] || null;
    rest = rest.replace(/^[a-z][a-z0-9]*-/, ''); // drop lowercase base (e.g. "pbc001-")
    rest = rest.replace(/^\d{3,}-?(?=[A-Z])/, ''); // strip leading numeric prefix (e.g. "074GYR-084" → "GYR-084")
    // 二重 elco- 対策: rest がまだ elco- で始まる場合は再帰抽出（例: elco-fls001-elco-fls001-FLS-002）
    if (/^elco-/i.test(rest)) return extractProductCode(rest, store);
    if (rest) return normalizeCode(rest);
    // trailing hyphen only (例: elco-lln001-) → lowercase セグメントを品番化
    return lowSeg ? normalizeCode(lowSeg) : null;
  }

  // ④ auPAY 括弧コード (elco- 以外)
  if (auPAY || pn.includes('（') || pn.includes('(')) {
    const bm = pn.match(/[（(]([A-Z]+-\d+)[）)]/);
    if (bm) {
      const c = bm[1];
      return normalizeCode(/^MC-\d+$/.test(c) ? 'DR-' + c : c);
    }
  }

  // ⑤ lowercase-prefix + UPPERCASE コード（メーカー商品含む: ldw001-LDW-006 など）
  const m5 = pn.match(/^[a-z][a-z0-9]*-([A-Z][A-Z0-9]+-\d+)$/);
  if (m5) return normalizeCode(m5[1]);

  // ⑥ 数値サフィックス: 8mw-mm110971-110972 → 110972
  const m6 = pn.match(/^[a-z0-9]+-[a-z0-9]+-(\d+)$/);
  if (m6) return m6[1];

  // ⑦ X?DR-XX-NNN をそのまま返す (例: DR-MH-566, XDR-WK-001 → as-is)
  if (/^X?DR-[A-Z]{2,3}-\d+$/.test(pn)) return pn;

  // ⑧ 裸の手帳系コード: WB-471 → DR-WB-471 (prefixなしで届く場合)
  const m8 = pn.match(/^(WB|WK|WS|WV|WX|MA|MG|MH|MC|MB|MK|LB)-(\d+)$/i);
  if (m8) return 'DR-' + m8[1].toUpperCase() + '-' + m8[2];

  // ⑨ 文字化け・不正サフィックス形式: EGP-701.00 → EGP-701、-EGP?701.00 → EGP-701、-MTP?1.00 → MTP-001
  const m9a = pn.match(/^([A-Z]{2,4})-(\d+)\.00$/);          // EGP-701.00 → EGP-701 (ゼロパディング付き)
  if (m9a) return m9a[1] + '-' + m9a[2].padStart(3, '0');
  const m9b = pn.match(/^-?([A-Z]{2,4})\?(\d+)\.00$/);       // -EGP?701.00 → EGP-701
  if (m9b) return m9b[1] + '-' + m9b[2].padStart(3, '0');

  return null;
}

// コード正規化
function normalizeCode(code) {
  if (!code) return code;
  // LLN-/ECL- は先頭3桁以降を切り捨て (例: LLN-002wf-brown → LLN-002)
  const m = code.match(/^((?:LLN|ECL)-\d{3})/);
  if (m) return m[1];
  // 不正サフィックス除去: EGP-701.00 → EGP-701 (ゼロパディング付き)
  const sa = code.match(/^([A-Z]{2,4})-(\d+)\.00$/);
  if (sa) return sa[1] + '-' + sa[2].padStart(3, '0');
  // 文字化けSKU正規化: -PREFIX?NNN.00 → PREFIX-NNN (例: -EGP?703.00 → EGP-703)
  const cm = code.match(/^-?([A-Z]{2,4})\?(\d+)\.00$/);
  if (cm) return cm[1] + '-' + cm[2].padStart(3, '0');
  // CRBコード正規化 (例: CRB102-xxx → CRB-102, CRB_011 → CRB-011)
  const crb = code.match(/^CRB(\d+)[-_]/i);
  if (crb) return 'CRB-' + crb[1].padStart(3, '0');
  // GYR 桁数不足をゼロパディング (例: GYR-51 → GYR-051)
  const gyr = code.match(/^GYR-(\d{1,2})$/i);
  if (gyr) return 'GYR-' + gyr[1].padStart(3, '0');
  // DR ハイフン欠落を補正 (例: DRMG-371 → DR-MG-371, DRMH-306 → DR-MH-306)
  const drn = code.match(/^DR([A-Z]{2})-(\d+)$/);
  if (drn) return 'DR-' + drn[1] + '-' + drn[2];
  // 在庫SFD- プレフィックス除去 (例: 在庫SFD-001 → SFD-001)
  if (/^在庫SFD-/i.test(code)) return code.slice(2);
  // 手帳コードに DR- プレフィックスを補完 (例: WB-470 → DR-WB-470, WL-123 → DR-WL-123)
  const dm = code.match(/^(WB|WK|WS|WV|WX|WL|MA|MG|MH|MC|MB|MK)-(\d+)$/i);
  if (dm) return 'DR-' + dm[1].toUpperCase() + '-' + dm[2];
  // AMPC → AMP-C 変換 (例: ampc037 → AMP-C037、AMPC-037 → AMP-C037)
  const ac = code.match(/^[Aa][Mm][Pp][Cc]-?(\d+)$/);
  if (ac) return 'AMP-C' + ac[1];
  // lowercase エンコードされた品番を変換 (例: lln001 → LLN-001, wcl023 → WCL-023)
  const lm = code.match(/^([a-z]{2,4})(\d+)$/);
  if (lm) return lm[1].toUpperCase() + '-' + lm[2].padStart(3, '0');
  return code;
}

function run() {
  try {
    const productMap  = buildProductMap(productBuf);
    const { map: categoryMap, debug: catDebug } = buildCategoryMap(productBuf);

    const csvRows = parseCSV(salesBuf);
    if (csvRows.length < 2) throw new Error('CSVにデータがありません');

    // Column index map
    const headers = csvRows[0].map(h => h.trim());
    const ci = {};
    headers.forEach((h, i) => ci[h] = i);

    const need = ['出荷日', '注文日時', '商品名', '商品番号', 'SKU管理番号', '個数', '商品単価', '税込別', '販売店舗'];
    const miss = need.filter(h => ci[h] === undefined);
    if (miss.length) throw new Error('必要な列がCSVにありません: ' + miss.join(', '));

    allRows = [];
    const storeSet = new Set();
    let dateMin = '', dateMax = '';

    for (let i = 1; i < csvRows.length; i++) {
      const r = csvRows[i];
      const g = k => (r[ci[k]] || '').trim();

      const date    = g('出荷日') || g('注文日時').slice(0, 10);
      const sku     = g('SKU管理番号');
      const pn      = g('商品番号');
      const rawName = g('商品名');
      const store   = g('販売店舗');
      const qty     = parseInt(g('個数'), 10) || 0;
      const taxType = g('税込別');
      let price     = parseInt(g('商品単価'), 10) || 0;

      if (!date) continue;
      if (taxType === '込') price = Math.round(price / 1.1);

      // ── 商品名・品番の決定 ──
      // 0. ハードコードマップ優先（Qoo10数値コード・Amazon ASINなど自動抽出不可のコード）
      const overrideCode = pn && PN_OVERRIDE[pn.trim()] || null;

      // 商品番号列から内部品番を抽出（最も信頼できるソース）
      const extracted = overrideCode || extractProductCode(pn, store);
      // SKU管理番号も正規化（LLN/ECL の truncation など）
      const normSku   = sku ? normalizeCode(sku) : null;

      let name    = null;
      let matched = false;
      // extracted を優先、なければ pn を正規化して表示（文字化けSKUが表示されるのを防ぐ）
      let code    = extracted || normalizeCode(pn) || pn;

      // 0b. ハードコードマップにヒットしたコードは自社確定（マスター照合も試みる）
      if (overrideCode) {
        code = overrideCode; matched = true;
        if (productMap.has(overrideCode)) name = productMap.get(overrideCode);
      }

      // 1. 商品番号から抽出した品番でマスター照合
      if (!matched && extracted && productMap.has(extracted)) {
        name = productMap.get(extracted); matched = true; code = extracted;
      }
      // 2. SKU管理番号（正規化済み）でマスター照合
      if (!matched && normSku && productMap.has(normSku)) {
        name = productMap.get(normSku); matched = true; code = normSku;
      }
      // 3. SKU管理番号（そのまま）でマスター照合
      if (!matched && sku && productMap.has(sku)) {
        name = productMap.get(sku); matched = true; code = normalizeCode(sku) || sku;
      }
      // 4. 商品番号そのものが品番の場合（例: DR-MH-583 で SKU が空）
      if (!matched && pn && productMap.has(pn)) {
        name = productMap.get(pn); matched = true; code = pn;
      }
      // 5. DR- ↔ XDR- 相互補完 (auPAY は DR- で登録、Excel は XDR- 限定版で登録されている場合)
      if (!matched) {
        const base = extracted || pn;
        if (base) {
          const alt = /^DR-/.test(base) ? 'X' + base : /^XDR-/.test(base) ? base.slice(1) : null;
          if (alt && productMap.has(alt)) {
            name = productMap.get(alt); matched = true; code = alt;
          }
        }
      }
      // 6. 自社確定プレフィックス: LBG- / AMP-C / SFD- はマスター未登録でも自社扱いとする
      if (!matched && (/^(?:LBG-|AMP-C|SFD-)/i.test(code) || code === 'LNC-413')) {
        matched = true;
      }
      // 7. フォールバック: CSV商品名を整形
      if (!name) name = cleanRawName(rawName);

      storeSet.add(store);
      if (!dateMin || date < dateMin) dateMin = date;
      if (!dateMax || date > dateMax) dateMax = date;

      const cats = categoryMap.get(code) || { cat1: '', cat2: '', cat3: '' };
      allRows.push({ date, store, code, name, price, qty, matched, ...cats });
    }

    // Populate filters
    const sel = document.getElementById('f-store');
    sel.innerHTML = '<option value="">すべての店舗</option>';
    storeSet.forEach(s => sel.innerHTML += `<option>${x(s)}</option>`);

    document.getElementById('f-from').value = dateMin;
    document.getElementById('f-to').value   = dateMax;

    // Default sort: date asc
    sortCol = 'date'; sortDir = 1;
    renderKPI();
    curPage = 1;
    render();

    document.getElementById('result').style.display = 'block';
    document.getElementById('btn-reset').style.display = '';

    const mc  = allRows.filter(r => r.matched).length;
    const catHit = allRows.filter(r => r.cat1 || r.cat2 || r.cat3).length;
    msg(`集計完了 — ${allRows.length.toLocaleString()}件 ／ マスター一致率 ${Math.round(mc/allRows.length*100)}%（${mc.toLocaleString()}件）／ カテゴリ設定 ${catHit.toLocaleString()}件`
      + `<br><details style="font-size:10px;margin-top:4px;text-align:left"><summary>📋 カテゴリ診断情報（クリックで展開）</summary><pre style="white-space:pre-wrap;word-break:break-all">${x(catDebug)}</pre></details>`, 'ok');

  } catch (e) {
    msg('エラー: ' + e.message, 'err');
    document.getElementById('btn-run').disabled = false;
    console.error(e);
  }
}

// ── Clean raw Rakuten product name ───────────────────────────────────────────
function cleanRawName(raw) {
  let s = raw
    .replace(/^[＼\\][^＼\\／/]+[／/]\s*/, '')   // ＼P2倍＋クーポン／
    .replace(/\([a-z0-9]+-[a-zA-Z0-9_-]+\)$/i, '')
    .trim();
  const pipe = s.indexOf('｜');
  if (pipe > 4) s = s.slice(0, pipe).trim();
  return s || raw;
}

// ── KPI strip ────────────────────────────────────────────────────────────────
function renderKPI() {
  const qty    = allRows.reduce((s, r) => s + r.qty, 0);
  const amount = allRows.reduce((s, r) => s + r.price * r.qty, 0);
  const skus   = new Set(allRows.map(r => r.code)).size;
  const mc     = allRows.filter(r => r.matched).length;

  document.getElementById('kpi-row').innerHTML = [
    ['明細件数',        allRows.length.toLocaleString()],
    ['SKU 種類',       skus.toLocaleString()],
    ['合計数量',        qty.toLocaleString()],
    ['合計金額（税抜）', '¥' + amount.toLocaleString()],
    ['マスター一致率',  Math.round(mc / allRows.length * 100) + '%'],
  ].map(([l, v]) => `<div class="kpi"><div class="kpi-val">${v}</div><div class="kpi-lbl">${l}</div></div>`).join('');
}

// ── Filter + sort + render ───────────────────────────────────────────────────
function filtered() {
  const from  = document.getElementById('f-from').value;
  const to    = document.getElementById('f-to').value;
  const store = document.getElementById('f-store').value;
  const text  = document.getElementById('f-text').value.toLowerCase();

  return allRows.filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    if (store && r.store !== store) return false;
    if (text && !r.name.toLowerCase().includes(text) && !r.code.toLowerCase().includes(text)) return false;
    return true;
  });
}

function sorted(data) {
  const col = sortCol, dir = sortDir;
  return [...data].sort((a, b) => {
    const av = a[col], bv = b[col];
    if (typeof av === 'string') return dir * av.localeCompare(bv, 'ja');
    return dir * (av - bv);
  });
}

function render() {
  const data  = sorted(filtered());
  const total = data.length;
  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  curPage = Math.min(curPage, pages);

  document.getElementById('f-count').textContent =
    total < allRows.length ? `${total.toLocaleString()} 件（全${allRows.length.toLocaleString()}件中）` : `${total.toLocaleString()} 件`;

  const slice = data.slice((curPage - 1) * PER_PAGE, curPage * PER_PAGE);

  let html = '';
  let lastDate = null;

  for (const r of slice) {
    if (sortCol === 'date' && r.date !== lastDate) {
      const dayName = ['日','月','火','水','木','金','土'][new Date(r.date).getDay()];
      html += `<tr class="date-row"><td colspan="8">${r.date} &nbsp;${dayName}曜日</td></tr>`;
      lastDate = r.date;
    }
    html += `<tr class="data-row">
      <td class="td-date">${sortCol === 'date' ? '—' : x(r.date)}</td>
      <td class="td-code">${x(r.cat1)}</td>
      <td class="td-code">${x(r.cat2)}</td>
      <td class="td-code">${x(r.cat3)}</td>
      <td class="td-name">${x(r.name)}${!r.matched ? '<span class="tag-unmatched">未一致</span>' : ''}</td>
      <td class="td-code">${x(r.code)}</td>
      <td class="num td-price">¥${r.price.toLocaleString()}</td>
      <td class="num">${r.qty.toLocaleString()}</td>
    </tr>`;
  }

  if (!html) html = `<tr class="empty-row"><td colspan="8">表示するデータがありません</td></tr>`;
  document.getElementById('tbody').innerHTML = html;

  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.remove('asc', 'desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'asc' : 'desc');
  });

  renderPg(pages);
}

// ── Pagination ───────────────────────────────────────────────────────────────
function renderPg(pages) {
  if (pages <= 1) { document.getElementById('pg').innerHTML = ''; return; }
  const p = curPage;
  let h = `<button class="pg" onclick="goPage(${p-1})" ${p===1?'disabled':''}>‹</button>`;
  const s = Math.max(1, p-2), e = Math.min(pages, p+2);
  if (s > 1) { h += `<button class="pg" onclick="goPage(1)">1</button>`; if (s>2) h+=`<span class="pg-ellipsis">…</span>`; }
  for (let i = s; i <= e; i++) h += `<button class="pg${i===p?' on':''}" onclick="goPage(${i})">${i}</button>`;
  if (e < pages) { if (e<pages-1) h+=`<span class="pg-ellipsis">…</span>`; h+=`<button class="pg" onclick="goPage(${pages})">${pages}</button>`; }
  h += `<button class="pg" onclick="goPage(${p+1})" ${p===pages?'disabled':''}>›</button>`;
  h += `<span class="pg-info">${p} / ${pages} ページ &nbsp;·&nbsp; 1ページ ${PER_PAGE.toLocaleString()}件</span>`;
  document.getElementById('pg').innerHTML = h;
}
function goPage(p) { curPage = p; render(); document.getElementById('table-scroll').scrollTop = 0; }

// ── Sort ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    curPage = 1;
    render();
  });
});

// ── Filter listeners ─────────────────────────────────────────────────────────
['f-from','f-to','f-store','f-text'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { curPage = 1; render(); })
);

// ── CSV export ───────────────────────────────────────────────────────────────
function doExport() {
  const data = sorted(filtered());
  const rows = [['販売日', '大分類', '中分類', '小分類', '商品名', '商品番号', '税抜単価', '数量', '小計（税抜）', '店舗', 'マスター一致']];
  data.forEach(r => rows.push([r.date, r.cat1, r.cat2, r.cat3, r.name, r.code, r.price, r.qty, r.price * r.qty, r.store, r.matched ? '○' : '×']));
  const csv = '﻿' + rows.map(r => r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })),
    download: '販売明細_' + new Date().toISOString().slice(0,10) + '.csv'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Reset ────────────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  salesBuf = productBuf = null; allRows = [];
  ['z-sales','z-product'].forEach(id => document.getElementById(id).classList.remove('done'));
  ['n-sales','n-product'].forEach(id => { const el = document.getElementById(id); el.textContent = ''; el.style.display = 'none'; });
  ['f-sales','f-product'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('notice').className = 'notice';
});

// ── Helpers ──────────────────────────────────────────────────────────────────
function msg(text, type, spin) {
  const el = document.getElementById('notice');
  el.className = 'notice show ' + type;
  el.innerHTML = (spin ? '<span class="spinner"></span>' : '') + text;
}
function x(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
