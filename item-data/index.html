<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EC販売データ集計ツール</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro W3', 'Meiryo', 'メイリオ', sans-serif;
      background: #f4f5f7;
      color: #1e1e2e;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: #1e2a45;
      color: #fff;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
    .header .badge {
      background: rgba(255,255,255,0.15);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .wrap { max-width: 1280px; margin: 0 auto; padding: 20px 20px 60px; }

    /* ── Upload section ── */
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }

    .drop-zone {
      background: #fff;
      border: 2px dashed #c8d0e0;
      border-radius: 10px;
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #3f7edd; background: #f0f5ff; }
    .drop-zone.done { border-color: #27ae60; border-style: solid; background: #f0fff8; }
    .drop-zone .icon { font-size: 32px; margin-bottom: 8px; }
    .drop-zone .label { font-weight: 700; font-size: 14px; color: #1e2a45; margin-bottom: 3px; }
    .drop-zone .hint { font-size: 12px; color: #9a9db0; }
    .drop-zone .fname { font-size: 12px; color: #27ae60; margin-top: 6px; font-weight: 600; }
    input[type=file] { display: none; }

    /* ── Action bar ── */
    .action-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }

    .btn-run {
      background: #3f7edd;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-run:hover:not(:disabled) { background: #2e6bc4; }
    .btn-run:disabled { opacity: .4; cursor: not-allowed; }

    .btn-reset {
      background: #fff;
      color: #555;
      border: 1.5px solid #d0d5e0;
      padding: 9px 18px;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-reset:hover { background: #f7f8fa; }

    /* ── Notice ── */
    .notice {
      display: none;
      padding: 11px 15px;
      border-radius: 7px;
      margin-bottom: 16px;
      font-size: 13px;
      border-left: 4px solid transparent;
    }
    .notice.show { display: flex; align-items: center; gap: 8px; }
    .notice.info  { background: #e8f0fe; border-color: #3f7edd; color: #1a52a0; }
    .notice.ok    { background: #edfdf5; border-color: #27ae60; color: #145a32; }
    .notice.err   { background: #fdf0ef; border-color: #e74c3c; color: #7b241c; }

    /* ── Result section ── */
    #result { display: none; }

    /* Summary strip */
    .summary-strip {
      display: flex;
      gap: 0;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .s-item {
      flex: 1;
      padding: 12px 18px;
      border-right: 1px solid #f0f0f0;
      text-align: center;
    }
    .s-item:last-child { border-right: none; }
    .s-item .sv { font-size: 22px; font-weight: 800; color: #1e2a45; line-height: 1; }
    .s-item .sk { font-size: 10px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }

    /* Filter bar */
    .filter-bar {
      background: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      flex-wrap: wrap;
    }
    .filter-bar input[type=text] {
      padding: 7px 11px;
      border: 1px solid #dde2ec;
      border-radius: 5px;
      font-size: 13px;
      width: 200px;
      outline: none;
    }
    .filter-bar input[type=text]:focus { border-color: #3f7edd; }
    .filter-bar input[type=date] {
      padding: 6px 8px;
      border: 1px solid #dde2ec;
      border-radius: 5px;
      font-size: 13px;
      outline: none;
    }
    .filter-bar input[type=date]:focus { border-color: #3f7edd; }
    .filter-bar select {
      padding: 7px 10px;
      border: 1px solid #dde2ec;
      border-radius: 5px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
      outline: none;
    }
    .filter-label { font-size: 11px; color: #999; white-space: nowrap; }
    .filter-bar .spacer { flex: 1; }
    .btn-export {
      background: #27ae60;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-export:hover { background: #1e8449; }
    .filter-count { font-size: 12px; color: #999; white-space: nowrap; }

    /* ── Main table ── */
    .table-outer {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; max-height: calc(100vh - 340px); overflow-y: auto; min-height: 300px; }

    table { width: 100%; border-collapse: collapse; }
    thead { position: sticky; top: 0; z-index: 10; }
    th {
      background: #f0f2f7;
      padding: 9px 12px;
      font-size: 11px;
      font-weight: 700;
      color: #5a6070;
      text-align: left;
      border-bottom: 1px solid #e0e4ed;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { background: #e6eaf3; color: #3f7edd; }
    th.asc::after  { content: ' ▲'; font-size: 9px; }
    th.desc::after { content: ' ▼'; font-size: 9px; }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid #f2f4f8;
      vertical-align: middle;
      line-height: 1.4;
    }
    tr:last-child td { border-bottom: none; }

    /* Date group separator */
    .date-row td {
      background: #f8f9fc;
      font-size: 11px;
      font-weight: 700;
      color: #7a8099;
      padding: 5px 12px 4px;
      letter-spacing: .3px;
      border-bottom: 1px solid #e8eaf0;
    }

    tr.data-row:hover td { background: #fafbff; }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      white-space: nowrap;
    }
    td.code { font-size: 12px; color: #5a6080; white-space: nowrap; }
    td.price { white-space: nowrap; }

    .tag-unmatched {
      display: inline-block;
      background: #fff3e0;
      color: #d35400;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      vertical-align: middle;
      margin-left: 4px;
      font-weight: 600;
    }

    .empty { padding: 60px; text-align: center; color: #ccc; font-size: 14px; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      border-top: 1px solid #f0f2f6;
    }
    .pg { padding: 4px 8px; border: 1px solid #dde2ec; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; color: #555; }
    .pg:hover { border-color: #3f7edd; color: #3f7edd; }
    .pg.on { background: #3f7edd; color: #fff; border-color: #3f7edd; }
    .pg:disabled { opacity: .35; cursor: not-allowed; }
    .pg-info { margin-left: auto; font-size: 12px; color: #aaa; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h1>EC販売データ集計ツール</h1>
  <span class="badge">販売日順 明細表示</span>
</div>

<div class="wrap">

  <!-- Upload -->
  <div class="upload-grid">
    <div class="drop-zone" id="z-sales">
      <div class="icon">📊</div>
      <div class="label">① 販売データ（CSV）</div>
      <div class="hint">楽天受注CSV（Shift-JIS）をドロップ</div>
      <input type="file" id="f-sales" accept=".csv">
      <div class="fname" id="n-sales"></div>
    </div>
    <div class="drop-zone" id="z-product">
      <div class="icon">📦</div>
      <div class="label">② 商品データ（Excel）</div>
      <div class="hint">最新の商品マスター .xlsx をドロップ</div>
      <input type="file" id="f-product" accept=".xlsx,.xls">
      <div class="fname" id="n-product"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn-run" id="btn-run" disabled>集計する</button>
    <button class="btn-reset" id="btn-reset" style="display:none">リセット</button>
  </div>

  <!-- Notice -->
  <div class="notice" id="notice"></div>

  <!-- Result -->
  <div id="result">

    <!-- Summary strip -->
    <div class="summary-strip" id="summary"></div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <span class="filter-label">期間</span>
      <input type="date" id="f-from">
      <span class="filter-label">〜</span>
      <input type="date" id="f-to">
      <select id="f-store"></select>
      <input type="text" id="f-text" placeholder="商品名・商品番号で検索…">
      <span class="spacer"></span>
      <span class="filter-count" id="f-count"></span>
      <button class="btn-export" onclick="doExport()">CSV 出力</button>
    </div>

    <!-- Table -->
    <div class="table-outer">
      <div class="table-scroll" id="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-col="date"  style="min-width:90px">販売日</th>
              <th data-col="name"  style="min-width:260px">商品名</th>
              <th data-col="code"  style="min-width:110px">商品番号</th>
              <th data-col="price" style="min-width:90px" class="num">税抜単価</th>
              <th data-col="qty"   style="min-width:60px" class="num">数量</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pg"></div>
    </div>

  </div><!-- /result -->
</div><!-- /wrap -->

<script>
// ── State ───────────────────────────────────────────────────────────────────
let salesBuf = null, productBuf = null;
let allRows   = [];   // fully processed rows
let sortCol   = 'date';
let sortDir   = 1;
let curPage   = 1;
const PER_PAGE = 500;

// ── File upload ──────────────────────────────────────────────────────────────
function initZone(zoneId, inputId, type) {
  const zone  = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); if (e.dataTransfer.files[0]) receive(e.dataTransfer.files[0], type); });
  input.addEventListener('change', e => { if (e.target.files[0]) receive(e.target.files[0], type); });
}

function receive(file, type) {
  const reader = new FileReader();
  reader.onload = e => {
    if (type === 'sales') {
      salesBuf = e.target.result;
      document.getElementById('n-sales').textContent   = '✓ ' + file.name;
      document.getElementById('z-sales').classList.add('done');
    } else {
      productBuf = e.target.result;
      document.getElementById('n-product').textContent = '✓ ' + file.name;
      document.getElementById('z-product').classList.add('done');
    }
    document.getElementById('btn-run').disabled = !(salesBuf && productBuf);
  };
  reader.readAsArrayBuffer(file);
}

initZone('z-sales',   'f-sales',   'sales');
initZone('z-product', 'f-product', 'product');

// ── CSV parser （Shift-JIS, handles quoted multiline） ────────────────────────
function parseCSV(buf) {
  const text = new TextDecoder('shift-jis').decode(new Uint8Array(buf));
  const rows = [];
  let cur = [], f = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { f += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      cur.push(f); f = '';
    } else if ((c === '\r' || c === '\n') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++;
      cur.push(f); f = '';
      if (cur.some(v => v)) rows.push(cur);
      cur = [];
    } else {
      f += c;
    }
  }
  if (f || cur.length) { cur.push(f); if (cur.some(v => v)) rows.push(cur); }
  return rows;
}

// ── Excel product master ─────────────────────────────────────────────────────
function buildProductMap(buf) {
  const wb  = XLSX.read(new Uint8Array(buf), { type: 'array' });
  const map = new Map();

  function load(sheetName) {
    const ws = wb.Sheets[sheetName];
    if (!ws) return;
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    // Row 0 = guide row, Row 1 = header, Row 2+ = data
    // col8 = 品番, col9 = 品名
    for (let i = 2; i < data.length; i++) {
      const r    = data[i];
      const code = r[8] != null ? String(r[8]).trim() : '';
      const name = r[9] != null ? String(r[9]).replace(/^[\s　]+|[\s　]+$/g, '') : '';
      if (code && name && code !== 'None') map.set(code, name);
    }
  }

  load('商品データ');
  load('plaisir別注');
  return map;
}

// ── 商品番号から内部品番を抽出 ───────────────────────────────────────────────
// Rules (in priority order):
//  1. ma-/mg-/mh-/wk-/ws-/wv-/wx- 手帳系 → 末尾の DR-XX-NNN / XDR-XX-NNN
//  2. cal-**- カレンダー → cal-XX- の後ろ
//  3. elco- 自社商品  → lowercase セグメントを除去して残りを品番化
//  4. auPAY 括弧コード → （XXX-NNN）の中身、MC-NNN は DR-MC-NNN に変換
//  5. その他 lowercase-PREFIX-UPPERCASE コード (例: ldw001-LDW-006)
//  6. 数値サフィックス (例: 8mw-mm110971-110972)
function extractProductCode(pn, store) {
  if (!pn) return null;
  const auPAY = store && store.includes('auPAY');

  // ① 手帳系プレフィックス: ma-/mg-/mh-/wk-/ws-/wv-/wx-
  if (/^(?:ma|mg|mh|wk|ws|wv|wx)-/i.test(pn)) {
    const hits = pn.match(/X?DR-[A-Z]{2,3}-\d+/g);
    return hits ? hits[hits.length - 1] : null;
  }

  // ② カレンダー: cal-**-CAL-NNN
  if (/^cal-/i.test(pn)) {
    const m = pn.match(/^cal-[^-]+-(.+)$/i);
    return m ? normalizeCode(m[1]) : null;
  }

  // ③ elco- 自社商品
  if (/^elco-/i.test(pn)) {
    // auPAY or 括弧あり → 括弧内コードを優先
    const bm = pn.match(/[（(]([A-Z]+-\d+)[）)]/);
    if (bm) {
      const c = bm[1];
      return normalizeCode(/^MC-\d+$/.test(c) ? 'DR-' + c : c);
    }
    // elco- を除去して先頭のlowercase セグメントをさらに除去
    let rest = pn.slice(5); // drop "elco-"
    rest = rest.replace(/^[a-z][a-z0-9]*-/, ''); // drop lowercase base (e.g. "pbc001-")
    return rest ? normalizeCode(rest) : null;
  }

  // ④ auPAY 括弧コード (elco- 以外)
  if (auPAY || pn.includes('（') || pn.includes('(')) {
    const bm = pn.match(/[（(]([A-Z]+-\d+)[）)]/);
    if (bm) {
      const c = bm[1];
      return normalizeCode(/^MC-\d+$/.test(c) ? 'DR-' + c : c);
    }
  }

  // ⑤ lowercase-prefix + UPPERCASE コード（メーカー商品含む: ldw001-LDW-006 など）
  const m5 = pn.match(/^[a-z][a-z0-9]*-([A-Z][A-Z0-9]+-\d+)$/);
  if (m5) return normalizeCode(m5[1]);

  // ⑥ 数値サフィックス: 8mw-mm110971-110972 → 110972
  const m6 = pn.match(/^[a-z0-9]+-[a-z0-9]+-(\d+)$/);
  if (m6) return m6[1];

  return null;
}

// LLN-/ECL- は先頭3桁以降を切り捨て (例: LLN-002wf-brown → LLN-002)
function normalizeCode(code) {
  if (!code) return code;
  const m = code.match(/^((?:LLN|ECL)-\d{3})/);
  return m ? m[1] : code;
}

// ── Main processing ──────────────────────────────────────────────────────────
document.getElementById('btn-run').addEventListener('click', () => {
  msg('処理中…', 'info', true);
  document.getElementById('btn-run').disabled = true;
  setTimeout(run, 60);
});

function run() {
  try {
    const productMap = buildProductMap(productBuf);

    const csvRows = parseCSV(salesBuf);
    if (csvRows.length < 2) throw new Error('CSVにデータがありません');

    // Column index map
    const headers = csvRows[0].map(h => h.trim());
    const ci = {};
    headers.forEach((h, i) => ci[h] = i);

    const need = ['出荷日', '注文日時', '商品名', '商品番号', 'SKU管理番号', '個数', '商品単価', '税込別', '販売店舗'];
    const miss = need.filter(h => ci[h] === undefined);
    if (miss.length) throw new Error('必要な列がCSVにありません: ' + miss.join(', '));

    allRows = [];
    const storeSet = new Set();
    let dateMin = '', dateMax = '';

    for (let i = 1; i < csvRows.length; i++) {
      const r = csvRows[i];
      const g = k => (r[ci[k]] || '').trim();

      const date    = g('出荷日') || g('注文日時').slice(0, 10);
      const sku     = g('SKU管理番号');
      const pn      = g('商品番号');
      const rawName = g('商品名');
      const store   = g('販売店舗');
      const qty     = parseInt(g('個数'), 10) || 0;
      const taxType = g('税込別');
      let price     = parseInt(g('商品単価'), 10) || 0;

      if (!date) continue;
      if (taxType === '込') price = Math.round(price / 1.1);

      // ── 商品名・品番の決定 ──
      // 商品番号列から内部品番を抽出（最も信頼できるソース）
      const extracted = extractProductCode(pn, store);
      // SKU管理番号も正規化（LLN/ECL の truncation など）
      const normSku   = sku ? normalizeCode(sku) : null;

      let name    = null;
      let matched = false;
      let code    = extracted || normSku || pn;

      // 1. 商品番号から抽出した品番でマスター照合
      if (extracted && productMap.has(extracted)) {
        name = productMap.get(extracted); matched = true; code = extracted;
      }
      // 2. SKU管理番号（正規化済み）でマスター照合
      if (!matched && normSku && productMap.has(normSku)) {
        name = productMap.get(normSku); matched = true; code = normSku;
      }
      // 3. SKU管理番号（そのまま）でマスター照合
      if (!matched && sku && productMap.has(sku)) {
        name = productMap.get(sku); matched = true; code = normalizeCode(sku) || sku;
      }
      // 4. 商品番号そのものが品番の場合（例: DR-MH-583 で SKU が空）
      if (!matched && pn && productMap.has(pn)) {
        name = productMap.get(pn); matched = true; code = pn;
      }
      // 5. フォールバック: CSV商品名を整形
      if (!name) name = cleanRawName(rawName);

      storeSet.add(store);
      if (!dateMin || date < dateMin) dateMin = date;
      if (!dateMax || date > dateMax) dateMax = date;

      allRows.push({ date, store, code, name, price, qty, matched });
    }

    // Populate filters
    const sel = document.getElementById('f-store');
    sel.innerHTML = '<option value="">すべての店舗</option>';
    storeSet.forEach(s => sel.innerHTML += `<option>${x(s)}</option>`);

    document.getElementById('f-from').value = dateMin;
    document.getElementById('f-to').value   = dateMax;

    // Default sort: date asc
    sortCol = 'date'; sortDir = 1;
    renderSummary();
    curPage = 1;
    render();

    document.getElementById('result').style.display = 'block';
    document.getElementById('btn-reset').style.display = '';

    const mc = allRows.filter(r => r.matched).length;
    msg(`完了：${allRows.length.toLocaleString()}件 ／ 商品マスター一致 ${Math.round(mc/allRows.length*100)}%（${mc.toLocaleString()}件）`, 'ok');

  } catch (e) {
    msg('エラー: ' + e.message, 'err');
    document.getElementById('btn-run').disabled = false;
    console.error(e);
  }
}

// ── Clean raw Rakuten product name ───────────────────────────────────────────
function cleanRawName(raw) {
  let s = raw
    .replace(/^[＼\\][^＼\\／/]+[／/]\s*/, '')   // ＼P2倍＋クーポン／
    .replace(/\([a-z0-9]+-[a-zA-Z0-9_-]+\)$/i, '')
    .trim();
  const pipe = s.indexOf('｜');
  if (pipe > 4) s = s.slice(0, pipe).trim();
  return s || raw;
}

// ── Summary strip ────────────────────────────────────────────────────────────
function renderSummary() {
  const qty    = allRows.reduce((s, r) => s + r.qty, 0);
  const amount = allRows.reduce((s, r) => s + r.price * r.qty, 0);
  const skus   = new Set(allRows.map(r => r.code)).size;
  const mc     = allRows.filter(r => r.matched).length;

  document.getElementById('summary').innerHTML = [
    [allRows.length.toLocaleString(), '明細件数'],
    [skus.toLocaleString(),           'SKU 種類'],
    [qty.toLocaleString(),            '合計数量'],
    ['¥' + amount.toLocaleString(),   '合計金額（税抜）'],
    [Math.round(mc / allRows.length * 100) + '%', 'マスター一致率'],
  ].map(([v, k]) => `<div class="s-item"><div class="sv">${v}</div><div class="sk">${k}</div></div>`).join('');
}

// ── Filter + sort + render ───────────────────────────────────────────────────
function filtered() {
  const from  = document.getElementById('f-from').value;
  const to    = document.getElementById('f-to').value;
  const store = document.getElementById('f-store').value;
  const text  = document.getElementById('f-text').value.toLowerCase();

  return allRows.filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    if (store && r.store !== store) return false;
    if (text && !r.name.toLowerCase().includes(text) && !r.code.toLowerCase().includes(text)) return false;
    return true;
  });
}

function sorted(data) {
  const col = sortCol, dir = sortDir;
  return [...data].sort((a, b) => {
    const av = a[col], bv = b[col];
    if (typeof av === 'string') return dir * av.localeCompare(bv, 'ja');
    return dir * (av - bv);
  });
}

function render() {
  const data  = sorted(filtered());
  const total = data.length;
  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  curPage = Math.min(curPage, pages);

  document.getElementById('f-count').textContent =
    total < allRows.length ? `${total.toLocaleString()} 件（全${allRows.length.toLocaleString()}件中）` : `${total.toLocaleString()} 件`;

  const slice = data.slice((curPage - 1) * PER_PAGE, curPage * PER_PAGE);

  // Build rows with date group separators
  let html = '';
  let lastDate = null;

  for (const r of slice) {
    // Date separator row when sorting by date
    if (sortCol === 'date' && r.date !== lastDate) {
      const d = r.date;
      const dayName = ['日','月','火','水','木','金','土'][new Date(d).getDay()];
      html += `<tr class="date-row"><td colspan="5">${d}（${dayName}）</td></tr>`;
      lastDate = r.date;
    }
    html += `<tr class="data-row">
      <td style="color:#888;font-size:12px">${sortCol === 'date' ? '' : x(r.date)}</td>
      <td>${x(r.name)}${!r.matched ? '<span class="tag-unmatched">未一致</span>' : ''}</td>
      <td class="code">${x(r.code)}</td>
      <td class="num price">¥${r.price.toLocaleString()}</td>
      <td class="num">${r.qty.toLocaleString()}</td>
    </tr>`;
  }

  if (!html) html = `<tr><td colspan="5" class="empty">表示するデータがありません</td></tr>`;
  document.getElementById('tbody').innerHTML = html;

  // Update sort indicators
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.remove('asc', 'desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'asc' : 'desc');
  });

  // Pagination
  renderPg(pages);
}

// ── Pagination ───────────────────────────────────────────────────────────────
function renderPg(pages) {
  if (pages <= 1) { document.getElementById('pg').innerHTML = ''; return; }
  const p = curPage;
  let h = `<button class="pg" onclick="goPage(${p-1})" ${p===1?'disabled':''}>‹</button>`;
  const s = Math.max(1, p-2), e = Math.min(pages, p+2);
  if (s > 1) { h += `<button class="pg" onclick="goPage(1)">1</button>`; if (s > 2) h += `<span style="padding:0 4px;color:#ccc">…</span>`; }
  for (let i = s; i <= e; i++) h += `<button class="pg${i===p?' on':''}" onclick="goPage(${i})">${i}</button>`;
  if (e < pages) { if (e < pages-1) h += `<span style="padding:0 4px;color:#ccc">…</span>`; h += `<button class="pg" onclick="goPage(${pages})">${pages}</button>`; }
  h += `<button class="pg" onclick="goPage(${p+1})" ${p===pages?'disabled':''}>›</button>`;
  h += `<span class="pg-info">${p} / ${pages} ページ（1ページ ${PER_PAGE.toLocaleString()}件）</span>`;
  document.getElementById('pg').innerHTML = h;
}
function goPage(p) { curPage = p; render(); document.getElementById('table-scroll').scrollTop = 0; }

// ── Sort on header click ─────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    curPage = 1;
    render();
  });
});

// ── Filter listeners ─────────────────────────────────────────────────────────
['f-from','f-to','f-store','f-text'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { curPage = 1; render(); })
);

// ── CSV export ───────────────────────────────────────────────────────────────
function doExport() {
  const data = sorted(filtered());
  const rows = [['販売日', '商品名', '商品番号', '税抜単価', '数量', '小計（税抜）', '店舗', 'マスター一致']];
  data.forEach(r => rows.push([r.date, r.name, r.code, r.price, r.qty, r.price * r.qty, r.store, r.matched ? '○' : '×']));
  const csv = '﻿' + rows.map(r => r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })),
    download: '販売明細_' + new Date().toISOString().slice(0,10) + '.csv'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Reset ────────────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  salesBuf = productBuf = null; allRows = [];
  ['z-sales','z-product'].forEach(id => document.getElementById(id).classList.remove('done'));
  ['n-sales','n-product'].forEach(id => document.getElementById(id).textContent = '');
  ['f-sales','f-product'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('notice').className = 'notice';
});

// ── Helpers ──────────────────────────────────────────────────────────────────
function msg(text, type, spin) {
  const el = document.getElementById('notice');
  el.className = 'notice show ' + type;
  el.innerHTML = (spin ? '<span class="spinner"></span>' : '') + text;
}

function x(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
