<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC 販売ランキング | EL COMMUN</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1917;--ink2:#44403c;--ink3:#78716c;--ink4:#a8a29e;
  --paper:#faf8f4;--white:#ffffff;--border:#e7e2da;--border2:#f0ece5;
  --gold:#92754a;--gold-lt:#f5efe4;--gold-mid:#c4a46b;
  --green:#3a6b52;--green-lt:#edf5f0;
  --red:#b85c3c;--red-lt:#fdf2ee;
  --sidebar-w:220px;--header-h:56px;
}
html{scroll-behavior:smooth}
body{font-family:'Hiragino Kaku Gothic Pro','ヒラギノ角ゴ Pro W3','Meiryo',sans-serif;background:var(--paper);color:var(--ink);font-size:13px;line-height:1.6;min-height:100vh}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--ink);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:200;}
.hd-logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:.04em;white-space:nowrap}
.hd-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.hd-sep{width:1px;height:20px;background:rgba(255,255,255,.12)}
.hd-date{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;letter-spacing:.03em}
.hd-date b{color:#e8d5a8;font-weight:600}
.hd-spacer{flex:1}
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;color:rgba(255,255,255,.35);font-size:13px;pointer-events:none}
#hd-search{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;color:#fff;padding:6px 12px 6px 32px;font-size:12px;width:220px;outline:none;font-family:inherit;transition:background .2s,border-color .2s}
#hd-search::placeholder{color:rgba(255,255,255,.3)}
#hd-search:focus{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3)}

/* ── Upload overlay ── */
.upload-overlay{position:fixed;inset:0;background:var(--paper);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px}
.upload-box{background:var(--white);border:2px dashed var(--border);border-radius:16px;padding:60px 80px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;max-width:480px;width:90%}
.upload-box:hover,.upload-box.over{border-color:var(--gold);background:var(--gold-lt)}
.upload-box.done{border-color:var(--green);background:var(--green-lt);border-style:solid}
.up-icon{font-size:48px;margin-bottom:16px}
.up-title{font-size:20px;font-weight:700;color:var(--ink);margin-bottom:8px}
.up-hint{font-size:13px;color:var(--ink3);line-height:1.7}
.up-files{margin-top:16px;text-align:left;font-size:12px;color:var(--green);display:none}
.up-file-item{display:flex;align-items:center;gap:6px;margin-top:4px}
.up-file-item::before{content:"✓";font-size:11px}
#hd-upload-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .2s;letter-spacing:.04em;white-space:nowrap}
#hd-upload-btn:hover{background:rgba(255,255,255,.2)}
.up-run-btn{background:var(--ink);color:#fff;border:none;padding:14px 40px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:background .18s,opacity .18s}
.up-run-btn:hover:not(:disabled){background:#2c2622}
.up-run-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Layout ── */
.layout{display:flex;padding-top:var(--header-h)}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;position:fixed;top:var(--header-h);bottom:0;left:0;overflow-y:auto;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-header{padding:14px 16px 10px;border-bottom:1px solid var(--border2)}
.sb-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.sb-total{font-size:11px;color:var(--ink3)}
.sb-total b{color:var(--ink);font-weight:700}
.sb-list{flex:1;padding:8px 0}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;transition:background .12s;border-left:3px solid transparent;position:relative}
.sb-item:hover{background:var(--gold-lt)}
.sb-item.active{background:var(--gold-lt);border-left-color:var(--gold)}
.sb-item-name{flex:1;font-size:12px;color:var(--ink2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item.active .sb-item-name{color:var(--ink);font-weight:600}
.sb-badge{font-size:10px;font-weight:700;color:var(--ink4);white-space:nowrap;font-variant-numeric:tabular-nums}
.sb-item.active .sb-badge{color:var(--gold)}
.sb-bar{position:absolute;bottom:0;left:19px;right:16px;height:2px;background:var(--border2);border-radius:1px}
.sb-bar-fill{height:100%;background:var(--gold);border-radius:1px;opacity:.6;transition:width .3s}
.sb-filter{padding:10px 12px;border-top:1px solid var(--border2)}
.sb-filter label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--ink4);display:block;margin-bottom:4px}
.sb-select{width:100%;height:30px;padding:0 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--ink);background:var(--paper);outline:none;font-family:inherit}
.sb-select:focus{border-color:var(--gold)}
.sb-rank-toggle{padding:8px 12px;border-bottom:1px solid var(--border2);display:flex;gap:4px}
.sb-toggle-btn{flex:1;padding:5px 4px;border:1px solid var(--border);border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.04em;cursor:pointer;background:var(--white);color:var(--ink3);transition:all .15s;text-align:center}
.sb-toggle-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ── Main ── */
.main{margin-left:var(--sidebar-w);flex:1;padding:24px 28px 60px;min-width:0}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);opacity:.3}
.kpi-val{font-size:20px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--ink4);letter-spacing:.08em;text-transform:uppercase}

/* Category header */
.cat-header{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.cat-name{font-size:22px;font-weight:700;color:var(--ink)}
.cat-totals{display:flex;gap:16px}
.cat-total-item{font-size:12px;color:var(--ink3)}
.cat-total-item b{color:var(--ink2);font-weight:700}
.cat-rank-label{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}

/* Ranking table */
.rank-table-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(28,25,23,.04)}
.rank-table{width:100%;border-collapse:collapse}
.rank-table thead{position:sticky;top:0;z-index:10}
.rank-table th{background:var(--ink);color:rgba(255,255,255,.6);padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-align:left;border-right:1px solid rgba(255,255,255,.06);white-space:nowrap}
.rank-table th:last-child{border-right:none}
.rank-table th.num{text-align:right}
.rank-table td{padding:9px 14px;border-bottom:1px solid var(--border2);vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:#fdf9f4}
.rank-table .num{text-align:right;font-variant-numeric:tabular-nums;font-family:'SF Mono','Menlo','Consolas',monospace;white-space:nowrap}
.rank-col{width:52px}
.rank-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.rank-1{background:#f5efe4;color:#7a5c1e;font-size:16px}
.rank-2{background:#f0f4f8;color:#3a5a7a;font-size:14px}
.rank-3{background:#f4ede8;color:#7a3a20;font-size:14px}
.rank-other{background:transparent;color:var(--ink4);font-size:11px}
.code-cell{font-size:11px;color:var(--ink3);font-family:'SF Mono','Menlo','Consolas',monospace;white-space:nowrap}
.name-cell{max-width:360px}
.bar-cell{width:100px}
.bar-bg{height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--gold);border-radius:3px;opacity:.7}
.tag-uncat{display:inline-block;font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--red-lt);color:var(--red);vertical-align:middle;margin-left:5px}

/* Search view */
.search-view{display:none}
.search-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.search-title span{font-size:14px;font-weight:400;color:var(--ink3);margin-left:8px}
.s-cat-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--gold-lt);color:var(--gold);margin-right:6px;white-space:nowrap}

/* Empty state */
.empty{text-align:center;padding:80px 20px;color:var(--ink4)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-msg{font-size:14px}

/* Spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(146,117,74,.25);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.notice{display:none;align-items:center;gap:8px;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:500}
.notice.show{display:flex}
.notice.info{background:var(--gold-lt);color:#7a5f35;border:1px solid #dfd0b4}
.notice.ok{background:var(--green-lt);color:#2d5540;border:1px solid #b4d4c4}
.notice.err{background:var(--red-lt);color:#8a3820;border:1px solid #e0beb0}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div>
    <div class="hd-logo">EC 販売ランキング</div>
    <div class="hd-sub">EL COMMUN</div>
  </div>
  <div class="hd-sep"></div>
  <div class="hd-date" id="hd-date">データ未読込</div>
  <div class="hd-spacer"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="hd-search" placeholder="商品名・品番で検索…" autocomplete="off">
  </div>
  <button id="hd-upload-btn">ファイル更新</button>
</header>

<!-- ── Upload Overlay ── -->
<div class="upload-overlay" id="upload-overlay">
  <div style="text-align:center;margin-bottom:-12px">
    <div style="font-size:28px;font-weight:700;color:var(--ink);margin-bottom:6px">EC 販売ランキング</div>
    <div style="font-size:13px;color:var(--ink3)">販売データを読み込んでランキングを表示します</div>
  </div>
  <div class="upload-box" id="upload-box">
    <div class="up-icon">📂</div>
    <div class="up-title">販売データ Excel ファイル</div>
    <div class="up-hint">
      年度別の販売明細Excelファイルを選択してください<br>
      複数ファイルを同時に選択できます<br>
      <span style="font-size:11px;color:var(--ink4)">（例: 2021_EC販売明細.xlsx、2022_EC販売明細.xlsx …）</span>
    </div>
    <div class="up-files" id="up-files"></div>
    <input type="file" id="up-input" accept=".xlsx,.xls" multiple style="display:none">
  </div>
  <div style="text-align:center">
    <div class="notice" id="up-notice"></div>
    <button class="up-run-btn" id="up-run-btn" disabled>集計を開始する →</button>
    <div style="margin-top:10px;font-size:11px;color:var(--ink4)">処理はすべてブラウザ内で完結します。データは外部送信されません。</div>
  </div>
</div>

<!-- ── App (hidden until data loaded) ── -->
<div class="layout" id="app" style="display:none">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-header">
      <div class="sb-label">カテゴリ</div>
      <div class="sb-total" id="sb-total"></div>
    </div>
    <div class="sb-rank-toggle">
      <button class="sb-toggle-btn on" id="tog-qty" onclick="setSort('qty')">個数順</button>
      <button class="sb-toggle-btn" id="tog-amt" onclick="setSort('amount')">金額順</button>
    </div>
    <div class="sb-list" id="sb-list"></div>
    <div class="sb-filter">
      <label>年度フィルター</label>
      <select class="sb-select" id="f-year" onchange="applyFilter()">
        <option value="all">全期間</option>
      </select>
    </div>
    <div class="sb-filter">
      <label>店舗フィルター</label>
      <select class="sb-select" id="f-store" onchange="applyFilter()">
        <option value="all">すべての店舗</option>
      </select>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="notice" id="main-notice"></div>
    <!-- KPI row -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Category ranking view -->
    <div id="cat-view">
      <div class="cat-header">
        <div class="cat-name" id="cat-name"></div>
        <div class="cat-totals" id="cat-totals"></div>
        <div class="cat-rank-label" id="cat-rank-label">個数ランキング</div>
      </div>
      <div class="rank-table-wrap">
        <table class="rank-table">
          <thead>
            <tr>
              <th class="rank-col">順位</th>
              <th>品番</th>
              <th>商品名</th>
              <th class="num">上代</th>
              <th class="num">個数</th>
              <th class="num">合計金額</th>
              <th style="width:110px">売上比</th>
            </tr>
          </thead>
          <tbody id="rank-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Search view -->
    <div class="search-view" id="search-view">
      <div class="search-title" id="search-title">検索結果</div>
      <div class="rank-table-wrap">
        <table class="rank-table">
          <thead>
            <tr>
              <th class="rank-col">順位</th>
              <th>カテゴリ</th>
              <th>品番</th>
              <th>商品名</th>
              <th class="num">上代</th>
              <th class="num">個数</th>
              <th class="num">合計金額</th>
            </tr>
          </thead>
          <tbody id="search-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

function handleFileList(fileList) {
  fileBufs = []; fileNames = [];
  let pending = fileList.length;
  if (!pending) return;
  upNotice.className = 'notice';
  setUpNotice('読み込み中…', 'info', true);
  upFilesEl.innerHTML = '';
  upFilesEl.style.display = 'block';

  Array.from(fileList).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      fileBufs.push(e.target.result);
      fileNames.push(file.name);
      const div = document.createElement('div');
      div.className = 'up-file-item';
      div.textContent = file.name;
      upFilesEl.appendChild(div);
      pending--;
      if (pending === 0) {
        setUpNotice(`${fileNames.length}ファイル 読み込み完了`, 'ok', false);
        upBox.classList.add('done');
        upRunBtn.disabled = false;
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function parseDate(val) {
  if (!val) return '';
  if (val instanceof Date) return val.toISOString().slice(0,10);
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // yyyy/m/d or yyyy/mm/dd
  const m1 = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (m1) return `${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
  // m/d/yyyy
  const m2 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m2) return `${m2[3]}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;
  // Numeric serial (Excel date number)
  const n = Number(s);
  if (!isNaN(n) && n > 40000) {
    const d = new Date((n - 25569) * 86400000);
    return d.toISOString().slice(0,10);
  }
  return '';
}

function parseExcel(buf) {
  const wb = XLSX.read(new Uint8Array(buf), {type:'array', cellDates:true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:true});
  if (rows.length < 2) return;

  const hdr = rows[0];
  const ci = {};
  hdr.forEach((h,i) => { if(h) ci[String(h).trim()] = i; });

  // Support both header formats
  const dateCol   = ci['販売日']   ?? ci['出荷日'] ?? ci['注文日時'] ?? -1;
  const nameCol   = ci['商品名']   ?? -1;
  const codeCol   = ci['商品番号'] ?? -1;
  const priceCol  = ci['税抜単価'] ?? ci['商品単価'] ?? -1;
  const qtyCol    = ci['数量']     ?? ci['個数'] ?? -1;
  const storeCol  = ci['店舗']     ?? ci['販売店舗'] ?? -1;
  const scat_Col  = ci['小分類']   ?? -1;

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r.some(v => v != null)) continue;
    const date = parseDate(r[dateCol]);
    if (!date) continue;

    const code  = r[codeCol] ? String(r[codeCol]).trim() : '';
    const name  = r[nameCol] ? String(r[nameCol]).trim() : '';
    const price = parseInt(r[priceCol]) || 0;
    const qty   = parseInt(r[qtyCol])   || 0;
    const store = r[storeCol] ? String(r[storeCol]).trim() : '';
    const scat  = r[scat_Col]? String(r[scat_Col]).trim() : '';
    const year  = date.slice(0,4);

    if (!code || qty <= 0) continue;

    // Category lookup
    let category = CODE_TO_CATEGORY[code] || '';
    if (!category && scat) category = scat;
    if (!category) category = '未分類';

    allRows.push({date, year, code, name, price, qty, store, category});
  }
}

function buildFilters() {
  const yrs = new Set(), strs = new Set();
  for (const r of allRows) {
    yrs.add(r.year);
    strs.add(r.store);
    if (!dateMin || r.date < dateMin) dateMin = r.date;
    if (!dateMax || r.date > dateMax) dateMax = r.date;
  }
  years  = [...yrs].sort();
  stores = [...strs].sort();

  const ysel = document.getElementById('f-year');
  ysel.innerHTML = '<option value="all">全期間</option>';
  for (const y of years) ysel.innerHTML += `<option value="${y}">${y}年</option>`;
  // Default to latest year
  if (years.length > 0) ysel.value = years[years.length - 1];

  const ssel = document.getElementById('f-store');
  ssel.innerHTML = '<option value="all">すべての店舗</option>';
  for (const s of stores) ssel.innerHTML += `<option value="${s}">${x(s)}</option>`;
}

function applyFilter() {
  const yr  = document.getElementById('f-year').value;
  const str = document.getElementById('f-store').value;

  filteredRows = allRows.filter(r => {
    if (yr  !== 'all' && r.year  !== yr)  return false;
    if (str !== 'all' && r.store !== str) return false;
    return true;
  });

  aggregate();
  updateHeaderDate();
  renderKPI();
  renderSidebar();

  if (selectedCategory) showCategory(selectedCategory);
  else {
    const first = CATEGORY_ORDER.find(c => aggregated[c]);
    if (first) showCategory(first);
  }
}

// ── Aggregation ───────────────────────────────────────────────────────────────
function aggregate() {
  aggregated = {};
  for (const r of filteredRows) {
    const c = r.category;
    if (!aggregated[c]) aggregated[c] = {};
    const k = r.code;
    if (!aggregated[c][k]) aggregated[c][k] = {code:k, name:r.name, price:r.price, qty:0, amount:0};
    aggregated[c][k].qty    += r.qty;
    aggregated[c][k].amount += r.price * r.qty;
    // Update name to latest seen (non-empty)
    if (r.name) aggregated[c][k].name = r.name;
    // Update price to latest
    if (r.price) aggregated[c][k].price = r.price;
  }

  totalQty = filteredRows.reduce((s,r)=>s+r.qty, 0);
  totalAmount = filteredRows.reduce((s,r)=>s+r.price*r.qty, 0);
}

function getCatRanked(cat) {
  if (!aggregated[cat]) return [];
  const items = Object.values(aggregated[cat]);
  items.sort((a,b) => sortMode==='qty' ? b.qty-a.qty : b.amount-a.amount);
  return items;
}

function getCatTotal(cat) {
  if (!aggregated[cat]) return {qty:0,amount:0};
  const items = Object.values(aggregated[cat]);
  return {
    qty:    items.reduce((s,i)=>s+i.qty,0),
    amount: items.reduce((s,i)=>s+i.amount,0)
  };
}

// ── Sort toggle ───────────────────────────────────────────────────────────────
function setSort(mode) {
  sortMode = mode;
  document.getElementById('tog-qty').className = 'sb-toggle-btn' + (mode==='qty'?' on':'');
  document.getElementById('tog-amt').className = 'sb-toggle-btn' + (mode==='amount'?' on':'');
  document.getElementById('cat-rank-label').textContent = mode==='qty'?'個数ランキング':'金額ランキング';
  renderSidebar();
  if (selectedCategory) showCategory(selectedCategory, false);
}

// ── KPI ───────────────────────────────────────────────────────────────────────
function renderKPI() {
  const skus = new Set(filteredRows.map(r=>r.code)).size;
  const catCnt = Object.keys(aggregated).filter(c=>c!=='未分類').length;
  document.getElementById('kpi-row').innerHTML = [
    ['合計販売数', totalQty.toLocaleString() + '個'],
    ['合計金額（税抜）', '¥' + totalAmount.toLocaleString()],
    ['SKU 種類', skus.toLocaleString() + '種'],
    ['カテゴリ数', catCnt + 'カテゴリ'],
  ].map(([l,v])=>`<div class="kpi"><div class="kpi-val">${v}</div><div class="kpi-lbl">${l}</div></div>`).join('');
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  // Ordered categories first, then others
  const ordered = CATEGORY_ORDER.filter(c=>aggregated[c]);
  const others  = Object.keys(aggregated).filter(c=>!CATEGORY_ORDER.includes(c)&&c!=='未分類').sort();
  if (aggregated['未分類']) others.push('未分類');
  const cats = [...ordered, ...others];

  // Max for bar scaling
  const maxVal = cats.reduce((m,c)=>{
    const t = getCatTotal(c);
    return Math.max(m, sortMode==='qty'?t.qty:t.amount);
  }, 0);

  let html = '';
  for (const cat of cats) {
    const t = getCatTotal(cat);
    const val = sortMode==='qty' ? t.qty : t.amount;
    const pct = maxVal ? (val/maxVal*100).toFixed(1) : 0;
    const badgeText = sortMode==='qty'
      ? t.qty.toLocaleString() + '個'
      : '¥' + Math.round(t.amount/10000) + '万';
    const icon = CATEGORY_ICONS[cat] || '📦';
    const active = cat === selectedCategory ? ' active' : '';
    html += `<div class="sb-item${active}" onclick="showCategory('${x(cat)}')" data-cat="${x(cat)}">
      <span style="font-size:14px">${icon}</span>
      <span class="sb-item-name">${x(cat)}</span>
      <span class="sb-badge">${badgeText}</span>
      <div class="sb-bar"><div class="sb-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  document.getElementById('sb-list').innerHTML = html;

  const yr = document.getElementById('f-year').value;
  const period = yr === 'all' ? '全期間' : yr + '年';
  document.getElementById('sb-total').innerHTML =
    `<b>${period}</b> &nbsp;${totalQty.toLocaleString()}個 / ¥${totalAmount.toLocaleString()}`;
}

// ── Category view ─────────────────────────────────────────────────────────────
function showCategory(cat, updateSidebar=true) {
  selectedCategory = cat;
  document.getElementById('hd-search').value = '';
  document.getElementById('search-view').style.display = 'none';
  document.getElementById('cat-view').style.display = 'block';

  if (updateSidebar) {
    document.querySelectorAll('.sb-item').forEach(el => {
      el.classList.toggle('active', el.dataset.cat === cat);
    });
  }

  const ranked = getCatRanked(cat);
  const t = getCatTotal(cat);
  const topVal = ranked.length ? (sortMode==='qty'?ranked[0].qty:ranked[0].amount) : 1;
  const catPct = totalQty ? (t.qty/totalQty*100).toFixed(1) : 0;

  document.getElementById('cat-name').textContent = (CATEGORY_ICONS[cat]||'📦') + ' ' + cat;
  document.getElementById('cat-totals').innerHTML = `
    <span class="cat-total-item"><b>${t.qty.toLocaleString()}</b> 個</span>
    <span class="cat-total-item"><b>¥${t.amount.toLocaleString()}</b></span>
    <span class="cat-total-item">全体の <b>${catPct}%</b></span>
    <span class="cat-total-item">SKU <b>${ranked.length}</b>種</span>
  `;

  let html = '';
  if (!ranked.length) {
    html = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">📭</div><div class="empty-msg">このカテゴリのデータがありません</div></div></td></tr>`;
  } else {
    ranked.forEach((item, idx) => {
      const rank = idx + 1;
      const val = sortMode==='qty' ? item.qty : item.amount;
      const barPct = topVal ? (val/topVal*100).toFixed(1) : 0;
      let rankEl;
      if (rank===1) rankEl=`<div class="rank-num rank-1">🥇</div>`;
      else if (rank===2) rankEl=`<div class="rank-num rank-2">🥈</div>`;
      else if (rank===3) rankEl=`<div class="rank-num rank-3">🥉</div>`;
      else rankEl=`<div class="rank-num rank-other">${rank}</div>`;
      html += `<tr>
        <td class="rank-col">${rankEl}</td>
        <td class="code-cell">${x(item.code)}</td>
        <td class="name-cell">${x(item.name)}</td>
        <td class="num">¥${item.price.toLocaleString()}</td>
        <td class="num" style="font-weight:600;color:${rank<=3?'var(--gold)':'var(--ink)'}">${item.qty.toLocaleString()}</td>
        <td class="num">¥${item.amount.toLocaleString()}</td>
        <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${barPct}%"></div></div></td>
      </tr>`;
    });
  }

  document.getElementById('rank-tbody').innerHTML = html;
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('hd-search').addEventListener('input', e => {
  const q = e.target.value.trim();
  if (!q) {
    document.getElementById('search-view').style.display = 'none';
    document.getElementById('cat-view').style.display = 'block';
    return;
  }
  doSearch(q);
});

function doSearch(q) {
  document.getElementById('cat-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'block';

  const ql = q.toLowerCase();
  const results = [];

  for (const [cat, items] of Object.entries(aggregated)) {
    const ranked = Object.values(items).sort((a,b)=>sortMode==='qty'?b.qty-a.qty:b.amount-a.amount);
    ranked.forEach((item, idx) => {
      if (item.name.toLowerCase().includes(ql) || item.code.toLowerCase().includes(ql)) {
        results.push({...item, cat, rank: idx+1});
      }
    });
  }

  results.sort((a,b) => sortMode==='qty' ? b.qty-a.qty : b.amount-a.amount);

  document.getElementById('search-title').innerHTML =
    `検索: "<b>${x(q)}</b>" <span>${results.length.toLocaleString()}件</span>`;

  let html = '';
  if (!results.length) {
    html = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">「${x(q)}」に一致する商品が見つかりませんでした</div></div></td></tr>`;
  } else {
    for (const r of results) {
      const rankIcon = r.rank===1?'🥇':r.rank===2?'🥈':r.rank===3?'🥉':r.rank;
      html += `<tr style="cursor:pointer" onclick="document.getElementById('hd-search').value='';showCategory('${x(r.cat)}')">
        <td class="rank-col"><div class="rank-num rank-${r.rank<=3?r.rank:'other'}">${rankIcon}</div></td>
        <td><span class="s-cat-tag">${x(r.cat)}</span></td>
        <td class="code-cell">${x(r.code)}</td>
        <td class="name-cell">${highlight(r.name, q)}</td>
        <td class="num">¥${r.price.toLocaleString()}</td>
        <td class="num" style="font-weight:600">${r.qty.toLocaleString()}</td>
        <td class="num">¥${r.amount.toLocaleString()}</td>
      </tr>`;
    }
  }
  document.getElementById('search-tbody').innerHTML = html;
}

function highlight(text, q) {
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return x(text).replace(new RegExp(`(${esc})`, 'gi'), '<mark style="background:#f5efe4;color:#7a5c1e;font-weight:700">$1</mark>');
}

// ── Header date ───────────────────────────────────────────────────────────────
function updateHeaderDate() {
  const yr = document.getElementById('f-year').value;
  const rows = yr==='all' ? allRows : allRows.filter(r=>r.year===yr);
  const mx = rows.reduce((m,r)=>r.date>m?r.date:m,'');
  const mn = rows.reduce((m,r)=>(m===''||r.date<m)?r.date:m,'');

  if (!mx) { document.getElementById('hd-date').textContent = 'データなし'; return; }

  const fmt = d => d.slice(0,4)+'年'+d.slice(5,7)+'月'+d.slice(8,10)+'日';
  document.getElementById('hd-date').innerHTML =
    `${fmt(mn)} 〜 <b>${fmt(mx)}</b> 分まで更新`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setUpNotice(text, type, spin) {
  upNotice.className = 'notice show ' + type;
  upNotice.innerHTML = (spin?'<span class="spinner"></span>':'') + text;
}

function x(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
